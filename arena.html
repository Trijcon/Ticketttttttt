<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — 1V1 Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.arena-wrap{max-width:900px;margin:0 auto;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:38px;letter-spacing:1px;margin-bottom:4px;color:var(--white);}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:20px;}
.status-top{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:all 0.3s;}
.status-dot.searching{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:blink 0.8s infinite;}
.status-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green);}
.status-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.queue-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);}

/* FEEDS */
.feeds-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}
.feed-box{position:relative;border-radius:14px;overflow:hidden;background:#020208;border:1px solid var(--border);aspect-ratio:4/3;}
.feed-video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1);}
.feed-canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;}
.feed-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.feed-ph-icon{font-size:44px;opacity:0.25;}
.feed-ph-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;}

/* SCAN OVERLAY */
.scan-overlay{position:absolute;inset:0;pointer-events:none;z-index:10;}

/* Top-left info panel */
.scan-info-tl{
  position:absolute;top:10px;left:10px;
  background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:10px 12px;min-width:130px;
  backdrop-filter:blur(4px);display:none;
}
.scan-score-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-bottom:2px;}
.scan-score-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;line-height:1;color:#fff;margin-bottom:4px;}
.scan-tier-badge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;}
.scan-dom-row{margin-top:6px;border-top:1px solid rgba(255,255,255,0.08);padding-top:6px;}
.scan-feat-label{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:1px;}
.scan-feat-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:#0df2c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.scan-flaw-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:#ff3d6b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}

/* Top-right label */
.scan-label-tr{
  position:absolute;top:10px;right:10px;
  background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:8px 12px;text-align:right;
  backdrop-filter:blur(4px);display:none;
}
.scan-label-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-bottom:4px;}
.scan-label-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:1px;color:#fff;margin-bottom:3px;}
.scan-label-elo{font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;gap:5px;justify-content:flex-end;}

/* Report button */
.report-btn{position:absolute;bottom:10px;left:10px;background:rgba(255,61,107,0.15);border:1px solid rgba(255,61,107,0.3);border-radius:7px;padding:5px 12px;color:#ff3d6b;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;display:none;z-index:15;transition:all 0.2s;}
.report-btn:hover{background:rgba(255,61,107,0.25);}

/* VS + MOGGING BAR */
.vs-section{display:flex;align-items:center;gap:14px;margin-bottom:10px;padding:0 4px;}
.mogging-wrap{flex:1;}
.mogging-label{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);margin-bottom:4px;}
.mogging-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;position:relative;}
.mogging-fill{position:absolute;left:0;top:0;height:100%;width:50%;background:linear-gradient(90deg,var(--teal),var(--violet));border-radius:999px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);}
.vs-circle{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:var(--muted);flex-shrink:0;}

.actions-row{display:flex;gap:10px;margin-bottom:12px;}

/* RESULT */
.result-card{display:none;background:linear-gradient(135deg,#141228,#0f0d20);border:1px solid rgba(13,242,200,0.2);border-radius:16px;padding:28px;text-align:center;}
.result-card.show{display:block;}
.result-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;margin-bottom:14px;}
.scores-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px;}
.score-big{font-family:'Barlow Condensed',sans-serif;font-size:68px;font-weight:900;color:var(--teal);line-height:1;}
.score-vs{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--muted2);}
.score-sm{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;}
.elo-line{font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:18px;}
.elo-up{color:var(--green);} .elo-down{color:var(--crimson);}
.result-actions{display:flex;gap:10px;justify-content:center;}
</style>
</head>
<body>
<div class="page-wrap">
<div class="arena-wrap">
  <div class="page-title">⚔️ 1V1 ARENA</div>
  <div class="page-sub">RANKED MATCHMAKING — PEER TO PEER</div>

  <div class="status-top">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-dot" id="sDot"></div>
      <div class="status-label" id="sText">Start your camera to enter the queue</div>
    </div>
    <div class="queue-label" id="qText"></div>
  </div>

  <div class="feeds-grid">
    <!-- YOU -->
    <div class="feed-box">
      <video class="feed-video" id="myVid" autoplay playsinline muted></video>
      <canvas class="feed-canvas" id="myCanvas"></canvas>
      <!-- Overlay -->
      <div class="scan-overlay">
        <div class="scan-info-tl" id="myInfoTL">
          <div class="scan-score-label">OVERALL SCORE</div>
          <div class="scan-score-val" id="myScoreVal">—</div>
          <div class="scan-tier-badge" id="myTierBadge">—</div>
          <div class="scan-dom-row">
            <div class="scan-feat-label">DOM</div>
            <div class="scan-feat-val" id="myDom">—</div>
            <div class="scan-feat-label" style="margin-top:3px;">FLAW</div>
            <div class="scan-flaw-val" id="myFlaw">—</div>
          </div>
        </div>
        <div class="scan-label-tr" id="myLabelTR">
          <div class="scan-label-tag">YOUR SCAN</div>
          <div class="scan-label-name" id="myLabelName">YOU</div>
          <div class="scan-label-elo" id="myLabelElo">
            <span id="myTierEmoji">🔴</span>
            <span id="myTierName" style="color:var(--teal);">SUB3</span>
            <span style="color:rgba(255,255,255,0.4);">|</span>
            <span id="myEloLabel" style="color:var(--teal);">400 ELO</span>
          </div>
        </div>
      </div>
      <div class="feed-ph" id="myPH"><div class="feed-ph-icon">📷</div><div class="feed-ph-text">CAMERA OFF</div></div>
    </div>

    <!-- OPPONENT -->
    <div class="feed-box">
      <video class="feed-video" id="oppVid" autoplay playsinline style="display:none;"></video>
      <!-- Overlay -->
      <div class="scan-overlay">
        <div class="scan-info-tl" id="oppInfoTL">
          <div class="scan-score-label">OVERALL SCORE</div>
          <div class="scan-score-val" id="oppScoreVal">—</div>
          <div class="scan-tier-badge" id="oppTierBadge">—</div>
          <div class="scan-dom-row">
            <div class="scan-feat-label">DOM</div>
            <div class="scan-feat-val" id="oppDom">—</div>
            <div class="scan-feat-label" style="margin-top:3px;">FLAW</div>
            <div class="scan-flaw-val" id="oppFlaw">—</div>
          </div>
        </div>
        <div class="scan-label-tr" id="oppLabelTR">
          <div class="scan-label-tag">ENEMY SCAN</div>
          <div class="scan-label-name" id="oppLabelName">—</div>
          <div class="scan-label-elo" id="oppLabelElo">
            <span id="oppTierEmoji">🔴</span>
            <span id="oppTierName" style="color:var(--crimson);">SUB3</span>
            <span style="color:rgba(255,255,255,0.4);">|</span>
            <span id="oppEloLabel" style="color:var(--crimson);">— ELO</span>
          </div>
        </div>
      </div>
      <button class="report-btn" id="reportBtn" onclick="reportOpponent()">REPORT</button>
      <div class="feed-ph" id="oppPH"><div class="feed-ph-icon">👤</div><div class="feed-ph-text" id="oppPHText">WAITING...</div></div>
    </div>
  </div>

  <!-- VS + MOGGING BAR -->
  <div class="vs-section">
    <div class="mogging-wrap">
      <div class="mogging-label"><span id="myMogLabel">YOU</span><span>MOGGING</span></div>
      <div class="mogging-bar"><div class="mogging-fill" id="moggingFill"></div></div>
    </div>
    <div class="vs-circle">VS</div>
    <div class="mogging-wrap">
      <div class="mogging-label"><span>MOGGING</span><span id="oppMogLabel">OPP</span></div>
      <div class="mogging-bar"><div class="mogging-fill" id="moggingFillR" style="background:linear-gradient(270deg,var(--crimson),var(--violet));left:auto;right:0;width:50%;"></div></div>
    </div>
  </div>

  <div class="actions-row">
    <button class="btn-outline" id="skipBtn" onclick="skipOpp()" style="display:none;flex:0 0 110px;">SKIP →</button>
    <button class="btn-amber" id="mainBtn" onclick="mainAction()" style="flex:1;font-size:17px;padding:15px;">START CAMERA</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-eyebrow">MATCH COMPLETE</div>
    <div class="result-title" id="rTitle">—</div>

      <div><div class="score-big" id="rMy">—</div><div class="score-sm">YOU</div></div>
      <div class="score-vs">VS</div>
      <div><div class="score-big" id="rOpp">—</div><div class="score-sm">OPPONENT</div></div>
    </div>
    <div class="elo-line" id="rElo"></div>
    <div class="result-actions">
      <button class="btn-amber" onclick="rematch()">REMATCH</button>
      <button class="btn-outline" onclick="window.location.href='index.html'">DASHBOARD</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="shared.js"></script>
<script type="module" src="auth.js"></script>
<script>
var state='idle',myStream=null,faceMesh=null,fmReady=false,myLandmarks=null;
var peerConn=null,oppSocketId=null,myRole=null;
var myLastScore=0,oppLastScore=0;
var ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

// Load user info
var _name  = localStorage.getItem('mgm_username')||localStorage.getItem('mgm_name')||'YOU';
var _elo   = parseInt(localStorage.getItem('mgm_elo')||'400');
var _photo = localStorage.getItem('mgm_photo')||'';
document.getElementById('myLabelName').textContent = _name;
document.getElementById('myEloLabel').textContent  = _elo+' ELO';
document.getElementById('myTierEmoji').textContent = getTierEmoji(_elo);
document.getElementById('myTierName').textContent  = getTierName(_elo);
document.getElementById('myMogLabel').textContent  = _name;

injectSharedUI();
connectWS(onMsg);

function onMsg(msg){
  switch(msg.type){
    case 'queue_joined':
      setS('searching','Searching for opponent...');
      document.getElementById('mainBtn').textContent='SEARCHING...';
      document.getElementById('mainBtn').disabled=true;
      document.getElementById('skipBtn').style.display='flex';
      state='searching'; break;
    case 'queue_update':
      document.getElementById('qText').textContent=msg.size>0?msg.size+' in queue':''; break;
    case 'match_found': onMatchFound(msg); break;
    case 'match_result': onResult(msg); break;
    case 'score_submitted': setS('searching','Score submitted — awaiting opponent...'); break;
    case 'opponent_disconnected':
      setS('','Opponent disconnected');resetOpp();closeRTC();state='camera';
      setBtnFind();document.getElementById('skipBtn').style.display='none';
      hideOverlays(); break;
    case 'opponent_skipped':
      setS('','You were skipped');resetOpp();closeRTC();state='camera';
      setBtnFind();document.getElementById('skipBtn').style.display='none';
      hideOverlays(); break;
    case 'webrtc_offer': handleOffer(msg); break;
    case 'webrtc_answer': handleAnswer(msg); break;
    case 'webrtc_ice': handleIce(msg); break;
  }
}

function mainAction(){ if(state==='idle')startCam(); else if(state==='camera')findMatch(); }

function startCam(){
  navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false})
  .then(function(stream){
    myStream=stream;
    var v=document.getElementById('myVid'); v.srcObject=stream;
    v.onloadedmetadata=function(){
      var c=document.getElementById('myCanvas'); c.width=v.videoWidth; c.height=v.videoHeight;
      document.getElementById('myPH').style.display='none';
      // Show my overlay
      document.getElementById('myInfoTL').style.display='block';
      document.getElementById('myLabelTR').style.display='block';
      state='camera'; setBtnFind(); setS('','Camera active — find a match!');
      initFM(v,c);
    };
  }).catch(function(){ setS('','Camera denied — allow access to continue'); });
}

function initFM(v,c){
  faceMesh=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.6});
  faceMesh.onResults(function(r){
    var ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height);
    if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){
      myLandmarks=r.multiFaceLandmarks[0];
      drawMesh(c,myLandmarks,'rgba(0,229,119,0.7)');
      // Live score preview during camera
      if(state==='camera'||state==='matched'){
        var live=calcDetailedScore(myLandmarks);
        document.getElementById('myScoreVal').textContent=live.score.toFixed(1);
        document.getElementById('myTierBadge').textContent=getTierEmoji(scoreToElo(live.score))+' '+getTierName(scoreToElo(live.score));
        document.getElementById('myTierBadge').style.color=getTierColor(live.score);
        document.getElementById('myDom').textContent=live.dom;
        document.getElementById('myFlaw').textContent=live.flaw;
        updateMoggingBar(live.score, oppLastScore);
      }
    }else{myLandmarks=null;}
  });
  fmReady=true;
  (async function loop(){if(!fmReady||!myStream)return;await faceMesh.send({image:v});requestAnimationFrame(loop);})();
}

function drawMesh(canvas,lm,dotColor){
  var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  ctx.fillStyle=dotColor||'rgba(0,229,119,0.7)';
  for(var i=0;i<lm.length;i++){ctx.beginPath();ctx.arc(lm[i].x*w,lm[i].y*h,1.4,0,Math.PI*2);ctx.fill();}
  var c=[[33,7],[7,163],[163,144],[144,145],[145,153],[153,154],[154,155],[155,133],[362,382],[382,381],[381,380],[380,374],[374,373],[373,390],[390,249],[249,263],[61,185],[185,40],[40,39],[39,37],[37,0],[0,267],[267,269],[269,270],[270,409],[409,291],[291,375],[375,321],[321,405],[405,314],[314,17],[17,84],[84,181],[181,91],[91,146],[146,61],[10,338],[338,297],[297,332],[332,284],[284,251],[251,389],[389,356],[356,454],[454,323],[323,361],[361,288],[288,397],[397,365],[365,379],[379,378],[378,400],[400,377],[377,152],[152,148],[148,176],[176,149],[149,150],[150,136],[136,172]];
  ctx.strokeStyle=(dotColor||'rgba(0,229,119,0.7)').replace('0.7','0.2');ctx.lineWidth=0.8;
  for(var j=0;j<c.length;j++){var a=c[j][0],b=c[j][1];if(lm[a]&&lm[b]){ctx.beginPath();ctx.moveTo(lm[a].x*w,lm[a].y*h);ctx.lineTo(lm[b].x*w,lm[b].y*h);ctx.stroke();}}
}

/* ═══════════════════════
   DETAILED ALGORITHM
═══════════════════════ */
function calcDetailedScore(lm){
  if(!lm) return {score:5,dom:'—',flaw:'—',metrics:{}};
  function dist(a,b){return Math.sqrt(Math.pow(lm[a].x-lm[b].x,2)+Math.pow(lm[a].y-lm[b].y,2));}

  // 1. FACIAL SYMMETRY — landmark mirroring around nose
  var nose=lm[1];
  var symPairs=[[33,263],[130,359],[159,386],[145,374],[61,291],[234,454],[58,288],[172,397]];
  var symDiff=0,symCount=0;
  for(var i=0;i<symPairs.length;i++){
    var l=symPairs[i][0],r=symPairs[i][1];
    if(lm[l]&&lm[r]){symDiff+=Math.abs(Math.abs(nose.x-lm[l].x)-Math.abs(lm[r].x-nose.x));symCount++;}
  }
  var symmetry=Math.max(0,Math.min(1,1-(symDiff/symCount)*16));

  // 2. JAW WIDTH RATIO — wider jaw = more masculine/defined
  var jawWidth=dist(234,454);
  var faceHeight=dist(10,152);
  var jawRatio=jawWidth/faceHeight;
  var jawScore=Math.max(0,Math.min(1,1-Math.abs(jawRatio-0.75)*4));

  // 3. CANTHAL TILT — positive = attractive (outer corner higher than inner)
  var leftInner=lm[133],leftOuter=lm[33];
  var rightInner=lm[362],rightOuter=lm[263];
  var leftTilt=(leftInner&&leftOuter)?(leftInner.y-leftOuter.y):0;
  var rightTilt=(rightInner&&rightOuter)?(rightInner.y-rightOuter.y):0;
  var avgTilt=(leftTilt+rightTilt)/2;
  var canthalScore=Math.max(0,Math.min(1,0.5+avgTilt*18));

  // 4. CHEEKBONE PROMINENCE — cheek width vs mid-face
  var cheekWidth=dist(234,454);
  var midFaceWidth=dist(130,359);
  var cheekRatio=midFaceWidth>0?cheekWidth/midFaceWidth:1;
  var cheekScore=Math.max(0,Math.min(1,1-Math.abs(cheekRatio-1.08)*5));

  // 5. EYE SPACING — intercanthal distance relative to face width
  var eyeDist=dist(133,362);
  var faceWidth=dist(234,454);
  var eyeRatio=faceWidth>0?eyeDist/faceWidth:0.3;
  var eyeScore=Math.max(0,Math.min(1,1-Math.abs(eyeRatio-0.32)*12));

  // 6. FOREHEAD RATIO — upper third
  var foreheadH=dist(10,168);
  var fhRatio=faceHeight>0?foreheadH/faceHeight:0.35;
  var foreheadScore=Math.max(0,Math.min(1,1-Math.abs(fhRatio-0.33)*10));

  // 7. NOSE-TO-FACE RATIO
  var noseW=dist(48,278);
  var noseRatio=faceWidth>0?noseW/faceWidth:0.25;
  var noseScore=Math.max(0,Math.min(1,1-Math.abs(noseRatio-0.22)*12));

  // WEIGHTED TOTAL
  var total=(
    symmetry*2.8+
    jawScore*2.0+
    canthalScore*1.8+
    cheekScore*1.2+
    eyeScore*0.8+
    foreheadScore*0.6+
    noseScore*0.4
  )/9.6;

  // Add small noise for naturalness
  var noise=(Math.random()-0.5)*0.3;
  var finalScore=Math.min(10,Math.max(1,total*9+noise));

  // Determine DOM and FLAW
  var metrics=[
    {name:'Symmetry',val:symmetry},
    {name:'Jawline',val:jawScore},
    {name:'Canthal Tilt',val:canthalScore},
    {name:'Cheekbones',val:cheekScore},
    {name:'Eye Spacing',val:eyeScore},
    {name:'Forehead',val:foreheadScore},
    {name:'Nose Ratio',val:noseScore},
  ];
  metrics.sort(function(a,b){return b.val-a.val;});
  var dom=metrics[0].name;
  var flaw=metrics[metrics.length-1].name;

  // Describe them nicely
  var domNames={Symmetry:'Strong Symmetry',Jawline:'Strong Jawline',
    'Canthal Tilt':'Positive Canthal','Cheekbones':'High Cheekbones',
    'Eye Spacing':'Ideal Eye Set','Forehead':'Balanced Forehead','Nose Ratio':'Proportional Nose'};
  var flawNames={Symmetry:'Asymmetry',Jawline:'Weak Jaw',
    'Canthal Tilt':'Negative Canthal','Cheekbones':'Flat Cheeks',
    'Eye Spacing':'Wide/Narrow Set','Forehead':'Forehead Ratio','Nose Ratio':'Nose Ratio'};

  return {
    score:finalScore,
    dom:domNames[dom]||dom,
    flaw:flawNames[flaw]||flaw,
    metrics:{symmetry,jawScore,canthalScore,cheekScore,eyeScore,foreheadScore,noseScore}
  };
}

function scoreToElo(score){
  if(score>=9.5)return 5001;if(score>=8.5)return 3501;if(score>=7.5)return 2001;
  if(score>=6.5)return 1501;if(score>=5.5)return 1001;if(score>=4.5)return 501;
  return 200;
}
function getTierColor(score){
  if(score>=9.5)return '#ff3d6b';if(score>=8.5)return '#f5a623';
  if(score>=7.5)return '#7b61ff';if(score>=6.5)return '#0df2c8';
  if(score>=5.5)return '#f5a623';if(score>=4.5)return '#7090d0';
  return '#ff3d6b';
}

function updateMoggingBar(myScore,oppScore){
  var total=myScore+oppScore;
  if(total===0)return;
  var myPct=(myScore/total)*100;
  document.getElementById('moggingFill').style.width=myPct+'%';
  document.getElementById('moggingFillR').style.width=(100-myPct)+'%';
}

function findMatch(){if(!myStream){setS('','Start camera first!');return;}wsSend({type:'join_queue'});}
function setBtnFind(){var b=document.getElementById('mainBtn');b.textContent='FIND MATCH \u2192';b.disabled=false;b.onclick=findMatch;}
function setBtnScan(){var b=document.getElementById('mainBtn');b.textContent='RUN SCAN';b.disabled=false;b.onclick=runScan;}

function onMatchFound(msg){
  state='matched';
  var opp=msg.opponent||{}; oppSocketId=opp.id; myRole=msg.role;
  var t=opp.tier||{name:'Sub3',emoji:'\uD83D\uDD34'};
  setS('connected','Matched: '+(opp.name||'Opponent')+' \u00B7 '+t.emoji+' '+t.name+' \u00B7 '+(opp.elo||400)+' ELO');
  document.getElementById('oppPHText').textContent=(opp.name||'Opponent')+' \u00B7 Connecting...';
  // Update opp overlay
  document.getElementById('oppLabelName').textContent=opp.name||'Opponent';
  document.getElementById('oppTierEmoji').textContent=t.emoji||'\uD83D\uDD34';
  document.getElementById('oppTierName').textContent=t.name||'Sub3';
  document.getElementById('oppEloLabel').textContent=(opp.elo||400)+' ELO';
  document.getElementById('oppMogLabel').textContent=opp.name||'OPP';
  setBtnScan(); document.getElementById('skipBtn').style.display='flex';
  startRTC();
}

function startRTC(){
  closeRTC(); peerConn=new RTCPeerConnection(ICE);
  if(myStream)myStream.getTracks().forEach(function(t){peerConn.addTrack(t,myStream);});
  peerConn.ontrack=function(e){
    var v=document.getElementById('oppVid'); v.srcObject=e.streams[0]; v.style.display='block';
    document.getElementById('oppPH').style.display='none';
    document.getElementById('oppInfoTL').style.display='block';
    document.getElementById('oppLabelTR').style.display='block';
    document.getElementById('reportBtn').style.display='block';
    setS('connected','Cameras live — run your scan!');
  };
  peerConn.onicecandidate=function(e){if(e.candidate)wsSend({type:'webrtc_ice',targetId:oppSocketId,candidate:e.candidate});};
  if(myRole==='offerer'){
    peerConn.createOffer({offerToReceiveVideo:true,offerToReceiveAudio:false}).then(function(o){
      return peerConn.setLocalDescription(o);
    }).then(function(){wsSend({type:'webrtc_offer',targetId:oppSocketId,offer:peerConn.localDescription});});
  }
}
function handleOffer(msg){if(!peerConn)return;peerConn.setRemoteDescription(new RTCSessionDescription(msg.offer)).then(function(){return peerConn.createAnswer();}).then(function(a){return peerConn.setLocalDescription(a);}).then(function(){wsSend({type:'webrtc_answer',targetId:msg.fromId,answer:peerConn.localDescription});});}
function handleAnswer(msg){if(!peerConn)return;peerConn.setRemoteDescription(new RTCSessionDescription(msg.answer));}
function handleIce(msg){if(!peerConn||!msg.candidate)return;peerConn.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(function(){});}
function closeRTC(){if(peerConn){peerConn.close();peerConn=null;}oppSocketId=null;myRole=null;}

function runScan(){
  if(!myLandmarks){setS('connected','\u26A0 Center your face in frame');return;}
  state='scanning';
  document.getElementById('mainBtn').textContent='SCANNING...'; document.getElementById('mainBtn').disabled=true;
  setS('searching','AI analyzing your features...');
  setTimeout(function(){
    var result=calcDetailedScore(myLandmarks);
    myLastScore=result.score;
    // Show final score on overlay
    document.getElementById('myScoreVal').textContent=result.score.toFixed(1);
    document.getElementById('myTierBadge').textContent=getTierEmoji(scoreToElo(result.score))+' '+getTierName(scoreToElo(result.score));
    document.getElementById('myTierBadge').style.color=getTierColor(result.score);
    document.getElementById('myDom').textContent=result.dom;
    document.getElementById('myFlaw').textContent=result.flaw;
    updateMoggingBar(result.score,oppLastScore);
    wsSend({type:'submit_score',score:result.score});
    setS('searching','Score submitted \u2014 awaiting opponent...');
  },2400);
}

function onResult(msg){
  state='result';
  myLastScore=msg.myScore||0; oppLastScore=msg.opponentScore||0;
  updateMoggingBar(myLastScore,oppLastScore);
  // Show opp score on overlay
  document.getElementById('oppScoreVal').textContent=oppLastScore.toFixed(1);
  var oppTierElo=scoreToElo(oppLastScore);
  document.getElementById('oppTierBadge').textContent=getTierEmoji(oppTierElo)+' '+getTierName(oppTierElo);
  document.getElementById('oppTierBadge').style.color=getTierColor(oppLastScore);
  document.getElementById('rMy').textContent=myLastScore.toFixed(1);
  document.getElementById('rOpp').textContent=oppLastScore.toFixed(1);
  document.getElementById('rTitle').textContent=msg.won?'\uD83C\uDFC6 VICTORY':'\uD83D\uDC80 DEFEATED';
  document.getElementById('rTitle').style.color=msg.won?'var(--green)':'var(--crimson)';
  var chg=msg.eloChange||0;
  document.getElementById('rElo').innerHTML='ELO: <span class="'+(chg>=0?'elo-up':'elo-down')+'">'+(chg>=0?'+':'')+chg+' \u2192 '+(msg.newElo||_elo)+' total</span>';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('mainBtn').style.display='none'; document.getElementById('skipBtn').style.display='none';
}

function rematch(){
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('mainBtn').style.display='block';
  state='camera'; setS('','Camera active — find a match!'); setBtnFind();
  oppLastScore=0; updateMoggingBar(myLastScore,0);
}

function skipOpp(){
  wsSend({type:'skip_opponent'}); resetOpp(); closeRTC(); state='camera';
  setS('','Searching for new opponent...'); setBtnFind(); document.getElementById('skipBtn').style.display='none';
  hideOverlays(); oppLastScore=0;
}

function resetOpp(){
  var v=document.getElementById('oppVid'); v.srcObject=null; v.style.display='none';
  document.getElementById('oppPH').style.display='flex'; document.getElementById('oppPHText').textContent='WAITING FOR OPPONENT...';
  document.getElementById('reportBtn').style.display='none';
}

function hideOverlays(){
  document.getElementById('oppInfoTL').style.display='none';
  document.getElementById('oppLabelTR').style.display='none';
  document.getElementById('reportBtn').style.display='none';
}

function reportOpponent(){
  var oppName=document.getElementById('oppLabelName').textContent;
  if(confirm('Report '+oppName+' for inappropriate behavior?')){
    wsSend({type:'report_user',targetId:oppSocketId,reason:'inappropriate'});
    alert('Report submitted. Thank you.');
  }
}

function setS(type,text){
  var d=document.getElementById('sDot'); d.className='status-dot'+(type?' '+type:'');
  document.getElementById('sText').textContent=text;
}
</script>
</body>
</html>

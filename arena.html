<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — 1V1 Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.arena-wrap{max-width:880px;margin:0 auto;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:38px;letter-spacing:1px;margin-bottom:4px;color:var(--white);}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:20px;}
.status-top{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:all 0.3s;}
.status-dot.searching{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:blink 0.8s infinite;}
.status-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green);}
.status-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.queue-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);}
.feeds-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.feed-box{position:relative;border-radius:14px;overflow:hidden;background:#020208;border:1px solid var(--border);aspect-ratio:4/3;}
.feed-label{position:absolute;top:10px;left:10px;z-index:5;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--white);background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:3px 10px;}
.feed-video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1);}
.feed-canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;}
.feed-score{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid rgba(13,242,200,0.3);border-radius:999px;padding:4px 18px;z-index:5;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--teal);display:none;white-space:nowrap;}
.feed-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.feed-ph-icon{font-size:44px;opacity:0.25;}
.feed-ph-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;}
.actions-row{display:flex;gap:10px;margin-bottom:12px;}
.result-card{display:none;background:linear-gradient(135deg,#141228,#0f0d20);border:1px solid rgba(13,242,200,0.2);border-radius:16px;padding:28px;text-align:center;}
.result-card.show{display:block;}
.result-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;margin-bottom:14px;}
.scores-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px;}
.score-big{font-family:'Barlow Condensed',sans-serif;font-size:68px;font-weight:900;color:var(--teal);line-height:1;}
.score-vs{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--muted2);}
.score-label-sm{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;}
.elo-line{font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:18px;}
.elo-up{color:var(--green);} .elo-down{color:var(--crimson);}
.result-actions{display:flex;gap:10px;justify-content:center;}
</style>
</head>
<body>
<div class="page-wrap">
<div class="arena-wrap">
  <div class="page-title">⚔️ 1V1 ARENA</div>
  <div class="page-sub">RANKED MATCHMAKING — PEER TO PEER</div>
  <div class="status-top">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-dot" id="sDot"></div>
      <div class="status-label" id="sText">Start your camera to enter the queue</div>
    </div>
    <div class="queue-label" id="qText"></div>
  </div>
  <div class="feeds-grid">
    <div class="feed-box">
      <div class="feed-label">YOU</div>
      <video class="feed-video" id="myVid" autoplay playsinline muted></video>
      <canvas class="feed-canvas" id="myCanvas"></canvas>
      <div class="feed-score" id="myScore"></div>
      <div class="feed-ph" id="myPH"><div class="feed-ph-icon">📷</div><div class="feed-ph-text">CAMERA OFF</div></div>
    </div>
    <div class="feed-box">
      <div class="feed-label">OPPONENT</div>
      <video class="feed-video" id="oppVid" autoplay playsinline style="display:none;"></video>
      <div class="feed-score" id="oppScore"></div>
      <div class="feed-ph" id="oppPH"><div class="feed-ph-icon">👤</div><div class="feed-ph-text" id="oppPHText">WAITING FOR OPPONENT...</div></div>
    </div>
  </div>
  <div class="actions-row">
    <button class="btn-outline" id="skipBtn" onclick="skipOpp()" style="display:none;flex:0 0 110px;">SKIP →</button>
    <button class="btn-amber" id="mainBtn" onclick="mainAction()" style="flex:1;font-size:17px;padding:15px;">START CAMERA</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-eyebrow">MATCH COMPLETE</div>
    <div class="result-title" id="rTitle">—</div>
    <div class="scores-row">
      <div><div class="score-big" id="rMy">—</div><div class="score-label-sm">YOU</div></div>
      <div class="score-vs">VS</div>
      <div><div class="score-big" id="rOpp">—</div><div class="score-label-sm">OPPONENT</div></div>
    </div>
    <div class="elo-line" id="rElo"></div>
    <div class="result-actions">
      <button class="btn-amber" onclick="rematch()">REMATCH</button>
      <button class="btn-outline" onclick="window.location.href='index.html'">DASHBOARD</button>
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="shared.js"></script>
<script type="module" src="auth.js"></script>
<script>
var state='idle',myStream=null,faceMesh=null,fmReady=false,myLandmarks=null;
var peerConn=null,oppSocketId=null,myRole=null;
var ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

injectSharedUI();
connectWS(onMsg);

function onMsg(msg){
  switch(msg.type){
    case 'queue_joined':
      setS('searching','Searching for opponent...');
      document.getElementById('mainBtn').textContent='SEARCHING...';
      document.getElementById('mainBtn').disabled=true;
      document.getElementById('skipBtn').style.display='flex';
      state='searching'; break;
    case 'queue_update':
      document.getElementById('qText').textContent=msg.size>0?msg.size+' in queue':''; break;
    case 'match_found': onMatchFound(msg); break;
    case 'match_result': onResult(msg); break;
    case 'score_submitted': setS('searching','Score submitted — awaiting opponent...'); break;
    case 'opponent_disconnected':
      setS('','Opponent disconnected');resetOpp();closeRTC();state='camera';
      setBtnFind();document.getElementById('skipBtn').style.display='none'; break;
    case 'opponent_skipped':
      setS('','You were skipped');resetOpp();closeRTC();state='camera';
      setBtnFind();document.getElementById('skipBtn').style.display='none'; break;
    case 'webrtc_offer': handleOffer(msg); break;
    case 'webrtc_answer': handleAnswer(msg); break;
    case 'webrtc_ice': handleIce(msg); break;
  }
}

function mainAction(){ if(state==='idle')startCam(); else if(state==='camera')findMatch(); }

function startCam(){
  navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false})
  .then(function(stream){
    myStream=stream;
    var v=document.getElementById('myVid'); v.srcObject=stream;
    v.onloadedmetadata=function(){
      var c=document.getElementById('myCanvas'); c.width=v.videoWidth; c.height=v.videoHeight;
      document.getElementById('myPH').style.display='none';
      state='camera'; setBtnFind(); setS('','Camera active — find a match!');
      initFM(v,c);
    };
  }).catch(function(){ setS('','Camera denied — allow access to continue'); });
}

function initFM(v,c){
  faceMesh=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.6});
  faceMesh.onResults(function(r){
    var ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height);
    if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){myLandmarks=r.multiFaceLandmarks[0];drawMesh(c,myLandmarks);}
    else{myLandmarks=null;}
  });
  fmReady=true;
  (function loop(){if(!fmReady||!myStream)return;faceMesh.send({image:v}).then(function(){requestAnimationFrame(loop);});})();
}

function drawMesh(canvas,lm){
  var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  ctx.fillStyle='rgba(245,166,35,0.55)';
  for(var i=0;i<lm.length;i++){ctx.beginPath();ctx.arc(lm[i].x*w,lm[i].y*h,1.2,0,Math.PI*2);ctx.fill();}
  var c=[[33,7],[7,163],[163,144],[144,145],[145,153],[153,154],[154,155],[155,133],[362,382],[382,381],[381,380],[380,374],[374,373],[373,390],[390,249],[249,263],[61,185],[185,40],[40,39],[39,37],[37,0],[0,267],[267,269],[269,270],[270,409],[409,291],[291,375],[375,321],[321,405],[405,314],[314,17],[17,84],[84,181],[181,91],[91,146],[146,61],[10,338],[338,297],[297,332],[332,284],[284,251],[251,389],[389,356],[356,454],[454,323],[323,361],[361,288],[288,397],[397,365],[365,379],[379,378],[378,400],[400,377],[377,152]];
  ctx.strokeStyle='rgba(245,166,35,0.15)';ctx.lineWidth=0.7;
  for(var j=0;j<c.length;j++){var a=c[j][0],b=c[j][1];if(lm[a]&&lm[b]){ctx.beginPath();ctx.moveTo(lm[a].x*w,lm[a].y*h);ctx.lineTo(lm[b].x*w,lm[b].y*h);ctx.stroke();}}
}

function findMatch(){if(!myStream){setS('','Start camera first!');return;}wsSend({type:'join_queue'});}
function setBtnFind(){var b=document.getElementById('mainBtn');b.textContent='FIND MATCH \u2192';b.disabled=false;b.onclick=findMatch;}
function setBtnScan(){var b=document.getElementById('mainBtn');b.textContent='RUN SCAN';b.disabled=false;b.onclick=runScan;}

function onMatchFound(msg){
  state='matched';
  var opp=msg.opponent||{}; oppSocketId=opp.id; myRole=msg.role;
  var t=opp.tier||{name:'Sub3',emoji:'\uD83D\uDD34'};
  setS('connected','Matched: '+（opp.name||'Opponent')+' \u00B7 '+t.emoji+' '+t.name+' \u00B7 '+(opp.elo||400)+' ELO');
  document.getElementById('oppPHText').textContent=(opp.name||'Opponent')+' \u00B7 Connecting...';
  setBtnScan(); document.getElementById('skipBtn').style.display='flex';
  startRTC();
}

function startRTC(){
  closeRTC(); peerConn=new RTCPeerConnection(ICE);
  if(myStream)myStream.getTracks().forEach(function(t){peerConn.addTrack(t,myStream);});
  peerConn.ontrack=function(e){
    var v=document.getElementById('oppVid'); v.srcObject=e.streams[0]; v.style.display='block';
    document.getElementById('oppPH').style.display='none'; setS('connected','Cameras live — run your scan!');
  };
  peerConn.onicecandidate=function(e){if(e.candidate)wsSend({type:'webrtc_ice',targetId:oppSocketId,candidate:e.candidate});};
  if(myRole==='offerer'){
    peerConn.createOffer({offerToReceiveVideo:true,offerToReceiveAudio:false}).then(function(o){
      return peerConn.setLocalDescription(o);
    }).then(function(){
      wsSend({type:'webrtc_offer',targetId:oppSocketId,offer:peerConn.localDescription});
    });
  }
}
function handleOffer(msg){if(!peerConn)return;peerConn.setRemoteDescription(new RTCSessionDescription(msg.offer)).then(function(){return peerConn.createAnswer();}).then(function(a){return peerConn.setLocalDescription(a);}).then(function(){wsSend({type:'webrtc_answer',targetId:msg.fromId,answer:peerConn.localDescription});});}
function handleAnswer(msg){if(!peerConn)return;peerConn.setRemoteDescription(new RTCSessionDescription(msg.answer));}
function handleIce(msg){if(!peerConn||!msg.candidate)return;peerConn.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(function(){});}
function closeRTC(){if(peerConn){peerConn.close();peerConn=null;}oppSocketId=null;myRole=null;}

function runScan(){
  if(!myLandmarks){setS('connected','\u26A0 Center your face in frame');return;}
  state='scanning';
  document.getElementById('mainBtn').textContent='SCANNING...'; document.getElementById('mainBtn').disabled=true;
  setS('searching','AI scanning your face...');
  setTimeout(function(){
    var score=calcScore();
    document.getElementById('myScore').textContent=score.toFixed(1); document.getElementById('myScore').style.display='block';
    wsSend({type:'submit_score',score:score}); setS('searching','Score submitted — awaiting opponent...');
  },2200);
}

function calcScore(){
  if(!myLandmarks)return+(Math.random()*3+5);
  var lm=myLandmarks;
  function dist(a,b){return Math.sqrt(Math.pow(a.x-b.x,2)+Math.pow(a.y-b.y,2));}
  var nose=lm[1];
  var pairs=[[33,263],[130,359],[159,386],[145,374],[61,291],[234,454]];
  var d=0,cnt=0;
  for(var i=0;i<pairs.length;i++){
    var l=pairs[i][0],r=pairs[i][1];
    if(!lm[l]||!lm[r])continue;
    d+=Math.abs(Math.abs(nose.x-lm[l].x)-Math.abs(lm[r].x-nose.x));cnt++;
  }
  var sym=Math.max(0,Math.min(1,1-(d/cnt)*14));
  var jaw=Math.max(0,Math.min(1,1-Math.abs(dist(lm[234],lm[454])/dist(lm[10],lm[152])-0.72)*5));
  var tilt=(lm[133].y-lm[33].y+lm[362].y-lm[263].y)/2;
  var canthal=Math.max(0,Math.min(1,0.5+tilt*14));
  return Math.min(10,Math.max(1,sym*3.5+jaw*3+canthal*2.5+Math.random()*0.8));
}

function onResult(msg){
  state='result';
  document.getElementById('rMy').textContent=(msg.myScore||0).toFixed(1);
  document.getElementById('rOpp').textContent=(msg.opponentScore||0).toFixed(1);
  document.getElementById('rTitle').textContent=msg.won?'\uD83C\uDFC6 VICTORY':'\uD83D\uDC80 DEFEATED';
  document.getElementById('rTitle').style.color=msg.won?'var(--green)':'var(--crimson)';
  var chg=msg.eloChange||0;
  document.getElementById('rElo').innerHTML='ELO: <span class="'+(chg>=0?'elo-up':'elo-down')+'">'+(chg>=0?'+':'')+chg+' \u2192 '+(msg.newElo||myElo)+' total</span>';
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('mainBtn').style.display='none'; document.getElementById('skipBtn').style.display='none';
}

function rematch(){
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('mainBtn').style.display='block'; document.getElementById('myScore').style.display='none';
  state='camera'; setS('','Camera active — find a match!'); setBtnFind();
}
function skipOpp(){
  wsSend({type:'skip_opponent'}); resetOpp(); closeRTC(); state='camera';
  setS('','Searching for new opponent...'); setBtnFind(); document.getElementById('skipBtn').style.display='none';
}
function resetOpp(){
  var v=document.getElementById('oppVid'); v.srcObject=null; v.style.display='none';
  document.getElementById('oppPH').style.display='flex'; document.getElementById('oppPHText').textContent='WAITING FOR OPPONENT...';
  document.getElementById('oppScore').style.display='none';
}
function setS(type,text){
  var d=document.getElementById('sDot'); d.className='status-dot'+(type?' '+type:'');
  document.getElementById('sText').textContent=text;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — 1V1 Arena Live</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ── IMAGE 2 SPECIFIC STYLES ── */
.feed-box {
  position: relative;
  background: #000;
  border: 1px solid var(--border);
  border-radius: 16px; /* Matching Image 2's rounded aesthetic */
  overflow: hidden;
  aspect-ratio: 16/11;
}

/* The Scanning Overlay from Image 2 */
.scanning-active::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: #0df2c8; /* Teal scan line */
  box-shadow: 0 0 15px #0df2c8;
  animation: scanMove 2.5s linear infinite;
  z-index: 20;
}

@keyframes scanMove {
  0% { top: 0; }
  100% { top: 100%; }
}

.match-timer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  color: var(--white);
  text-align: center;
  margin: 10px 0;
  letter-spacing: 4px;
}

/* Status Labels for "SCANNING..." state */
.scan-status-overlay {
  position: absolute;
  top: 15px; left: 15px;
  background: rgba(0,0,0,0.7);
  padding: 5px 12px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--teal);
  display: none;
  z-index: 25;
}

.getmog-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 999px;
  margin: 20px auto;
  max-width: 600px;
  position: relative;
  overflow: hidden;
}

.getmog-fill {
  height: 100%;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="match-timer" id="matchTimer">00:00</div>

  <div class="feeds-grid">
    <div class="feed-box" id="myFeed">
      <div class="scan-status-overlay" id="myScanLabel">SCANNING...</div>
      <video class="feed-video" id="myVid" autoplay playsinline muted></video>
      <div class="scan-label-tr">
        <div id="myLabelName">YOU</div>
        <div id="myEloLabel">400 ELO</div>
      </div>
    </div>

    <div class="feed-box" id="oppFeed">
      <video class="feed-video" id="oppVid" autoplay playsinline></video>
      <div class="scan-label-tr">
        <div id="oppLabelName">OPPONENT</div>
        <div id="oppEloLabel">--- ELO</div>
      </div>
    </div>
  </div>

  <div class="getmog-bar">
    <div class="getmog-fill" id="mogFill" style="width: 50%; background

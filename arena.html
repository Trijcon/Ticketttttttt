<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — 1V1 Arena</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body { padding-right:0!important; }
.top-nav,.guest-banner { right:0!important; }
.chat-sidebar { display:none!important; }
.page-wrap { max-width:none; padding:0; }

.arena-shell {
  min-height:100vh; display:flex; flex-direction:column;
  background:#000; position:relative; overflow:hidden;
}
.arena-shell::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 25% 50%, rgba(74,158,255,0.055) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 75% 50%, rgba(74,158,255,0.04) 0%, transparent 60%);
}

.arena-header {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 32px 0;
}
.arena-back { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1px; color:var(--muted); text-decoration:none; display:flex; align-items:center; gap:6px; transition:color 0.2s; }
.arena-back:hover { color:var(--blue); }
.arena-eyebrow { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--muted2); margin-bottom:2px; }
.arena-title { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:22px; color:var(--white); letter-spacing:-0.3px; }
.arena-online { display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2); }
.arena-online-dot { width:5px; height:5px; border-radius:50%; background:var(--green); opacity:0.8; }

.status-ticker {
  position:relative; z-index:10; margin:14px 32px 0;
  display:flex; align-items:center; gap:10px; padding:10px 16px;
  background:rgba(255,255,255,0.018); border:1px solid rgba(255,255,255,0.055); border-radius:6px;
}
.st-dot { width:5px; height:5px; border-radius:50%; background:var(--muted2); flex-shrink:0; transition:all 0.3s; }
.st-dot.searching { background:var(--amber); animation:stpulse 0.9s infinite; }
.st-dot.connected { background:var(--green); box-shadow:0 0 6px var(--green); }
@keyframes stpulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
.st-text { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex:1; }
.st-queue { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2); }

.arena-stage {
  position:relative; z-index:5; flex:1; display:grid;
  grid-template-columns:1fr 72px 1fr; align-items:stretch; gap:0;
  margin:14px 32px 0; min-height:calc(100vh - 250px);
}

.feed-wrap {
  position:relative; overflow:hidden; border-radius:8px;
  background:#050508; border:1px solid rgba(255,255,255,0.055); transition:border-color 0.3s;
}
.feed-wrap.active { border-color:rgba(74,158,255,0.28); }

.feed-video { width:100%; height:100%; object-fit:cover; display:block; transform:scaleX(-1); min-height:300px; }
.feed-canvas { position:absolute; top:0; left:0; width:100%; height:100%; transform:scaleX(-1); pointer-events:none; }

/* Scan sweep line */
.feed-scan-line {
  position:absolute; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,rgba(74,158,255,0.8),rgba(255,255,255,0.5),rgba(74,158,255,0.8),transparent);
  box-shadow:0 0 14px rgba(74,158,255,0.5); z-index:8; pointer-events:none;
  animation:scanSweep 3s linear infinite; opacity:0; transition:opacity 0.3s;
}
.feed-wrap.scanning .feed-scan-line { opacity:1; }
@keyframes scanSweep { 0%{top:0} 100%{top:100%} }

/* Corner brackets */
.bk { position:absolute; width:18px; height:18px; z-index:9; }
.bk.tl{top:12px;left:12px;border-top:1.5px solid rgba(74,158,255,0.45);border-left:1.5px solid rgba(74,158,255,0.45);}
.bk.tr{top:12px;right:12px;border-top:1.5px solid rgba(74,158,255,0.45);border-right:1.5px solid rgba(74,158,255,0.45);}
.bk.bl{bottom:12px;left:12px;border-bottom:1.5px solid rgba(74,158,255,0.45);border-left:1.5px solid rgba(74,158,255,0.45);}
.bk.br{bottom:12px;right:12px;border-bottom:1.5px solid rgba(74,158,255,0.45);border-right:1.5px solid rgba(74,158,255,0.45);}

/* Score pill */
.score-pill {
  position:absolute; top:14px; left:14px; z-index:10; display:none;
  background:rgba(0,0,0,0.82); border:1px solid rgba(74,158,255,0.2);
  border-radius:6px; padding:10px 13px; min-width:115px; backdrop-filter:blur(10px);
}
.sp-label { font-family:'JetBrains Mono',monospace; font-size:7px; letter-spacing:2px; color:var(--muted2); margin-bottom:3px; text-transform:uppercase; }
.sp-score { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:36px; line-height:1; color:#fff; margin-bottom:3px; }
.sp-tier { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--blue); letter-spacing:1px; margin-bottom:6px; }
.sp-div { height:1px; background:rgba(255,255,255,0.06); margin-bottom:5px; }
.sp-dom { font-family:'JetBrains Mono',monospace; font-size:9px; color:#e0e0e0; margin-bottom:2px; }
.sp-flaw { font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(255,100,100,0.8); }
.sp-sym { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--muted2); margin-top:2px; }

/* Name pill */
.name-pill {
  position:absolute; top:14px; right:14px; z-index:10; display:none;
  background:rgba(0,0,0,0.82); border:1px solid rgba(255,255,255,0.07);
  border-radius:6px; padding:8px 12px; text-align:right; backdrop-filter:blur(10px);
}
.np-tag { font-family:'JetBrains Mono',monospace; font-size:7px; letter-spacing:2px; color:var(--muted2); margin-bottom:4px; }
.np-name { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; color:#fff; margin-bottom:3px; }
.np-elo { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--blue); }

.report-btn {
  position:absolute; bottom:14px; left:14px; z-index:10; display:none;
  background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25);
  border-radius:4px; padding:5px 12px; color:var(--red);
  font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px;
  cursor:pointer; transition:all 0.2s;
}
.report-btn:hover { background:rgba(239,68,68,0.2); }

/* Feed placeholder */
.feed-ph { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:7; }
.feed-ph-icon { opacity:0.12; }
.feed-ph-text { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2); letter-spacing:1px; }

/* Searching overlay — blurs YOUR feed while in queue */
.search-overlay {
  position:absolute; inset:0; z-index:20; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
.feed-wrap.searching-state .search-overlay { display:flex; }
.feed-wrap.searching-state .feed-video,
.feed-wrap.searching-state .feed-canvas {
  filter:blur(14px) brightness(0.4) saturate(0.5);
  transition:filter 0.5s ease;
}

/* Radial glow border when searching */
.feed-wrap.searching-state {
  border-color:rgba(74,158,255,0.3);
  box-shadow:0 0 40px rgba(74,158,255,0.08), inset 0 0 60px rgba(74,158,255,0.04);
}

.so-ring {
  width:60px; height:60px; border-radius:50%;
  border:1px solid rgba(74,158,255,0.35);
  display:flex; align-items:center; justify-content:center;
  animation:soring 2.2s ease-in-out infinite;
  box-shadow:0 0 30px rgba(74,158,255,0.2), inset 0 0 20px rgba(74,158,255,0.05);
}
@keyframes soring { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.08);opacity:1} }
.so-hex {
  width:22px; height:22px;
  clip-path:polygon(25% 8%,75% 8%,100% 50%,75% 92%,25% 92%,0 50%);
  background:rgba(74,158,255,0.95);
  box-shadow:0 0 12px rgba(74,158,255,0.6);
}
.so-text { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.65); text-transform:uppercase; text-align:center; line-height:1.5; }
.so-timer { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; color:#fff; letter-spacing:2px; }
.so-cancel {
  background:none; border:1px solid rgba(255,255,255,0.1); border-radius:4px;
  padding:6px 20px; color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:1px; cursor:pointer; transition:all 0.2s;
}
.so-cancel:hover { color:var(--silver); border-color:rgba(255,255,255,0.18); }

.vs-col { display:flex; align-items:center; justify-content:center; }
.vs-circle {
  width:46px; height:46px; border-radius:50%;
  background:rgba(0,0,0,0.9); border:1px solid rgba(74,158,255,0.18);
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; color:var(--muted);
  box-shadow:0 0 18px rgba(74,158,255,0.07);
}

/* BOTTOM */
.arena-bottom { position:relative; z-index:10; padding:12px 32px 24px; display:flex; flex-direction:column; gap:10px; }

.mog-section { display:flex; align-items:center; gap:10px; }
.mog-side { flex:1; }
.mog-label { display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted2); margin-bottom:4px; letter-spacing:0.5px; }
.mog-track { height:5px; background:rgba(255,255,255,0.04); border-radius:999px; overflow:hidden; }
.mog-fill { height:100%; background:linear-gradient(90deg,#4A9EFF,#0df2c8); border-radius:999px; width:50%; transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
.mog-fill-r { background:linear-gradient(270deg,#ef4444,#7b61ff); }

.controls-row { display:flex; align-items:center; gap:8px; }
.skip-btn {
  padding:11px 18px; border-radius:6px; border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02); color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:1px; cursor:pointer; display:none; transition:all 0.2s; flex-shrink:0;
}
.skip-btn:hover { color:var(--silver); border-color:rgba(255,255,255,0.12); }
.main-btn {
  flex:1; padding:13px; border-radius:6px; border:none; background:var(--blue); color:#000;
  font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.3px;
  cursor:pointer; transition:opacity 0.2s;
}
.main-btn:hover { opacity:0.85; }
.main-btn:disabled { background:rgba(74,158,255,0.15); color:rgba(74,158,255,0.4); cursor:not-allowed; }

/* RESULT OVERLAY */
.result-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.88); backdrop-filter:blur(18px);
  align-items:center; justify-content:center; padding:20px;
}
.result-overlay.show { display:flex; }
.result-box { max-width:440px; width:100%; text-align:center; animation:rIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes rIn { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:none} }
.result-verdict { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:64px; letter-spacing:-1px; line-height:1; margin-bottom:8px; }
.result-verdict.win { color:var(--green); text-shadow:0 0 40px rgba(34,197,94,0.4); }
.result-verdict.loss { color:var(--red); text-shadow:0 0 36px rgba(239,68,68,0.35); }
.result-by { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; margin-bottom:24px; }
.result-scores { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:22px; }
.rs-block { flex:1; max-width:140px; padding:16px 12px; border-radius:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); }
.rs-block.ws { border-color:rgba(34,197,94,0.3); background:rgba(34,197,94,0.05); }
.rs-block.ls { border-color:rgba(239,68,68,0.3); background:rgba(239,68,68,0.05); }
.rs-lbl { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--muted2); margin-bottom:7px; }
.rs-num { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:46px; line-height:1; color:#fff; }
.rs-elo { font-family:'JetBrains Mono',monospace; font-size:10px; margin-top:7px; }
.rs-vs { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2); flex-shrink:0; }
.result-btns { display:flex; flex-direction:column; gap:8px; }
.result-btns button { width:100%; padding:13px; border-radius:6px; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; transition:all 0.2s; border:1px solid; }
.rb-r { background:rgba(74,158,255,0.1); border-color:rgba(74,158,255,0.3); color:var(--blue); }
.rb-r:hover { background:rgba(74,158,255,0.18); }
.rb-h { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.07); color:var(--muted); }
.rb-h:hover { color:var(--silver); border-color:rgba(255,255,255,0.12); }

@media(max-width:700px){
  .arena-stage{grid-template-columns:1fr;grid-template-rows:1fr 44px 1fr;margin:10px 14px 0;}
  .vs-col{height:44px;} .arena-header,.arena-bottom{padding-left:14px;padding-right:14px;}
  .status-ticker{margin-left:14px;margin-right:14px;}
}

/* ── TIER BORDER GLOW ── */
.feed-wrap.tier-Slayer { border-color:rgba(255,61,107,0.5); box-shadow:0 0 30px rgba(255,61,107,0.12); }
.feed-wrap.tier-Chad   { border-color:rgba(245,166,35,0.5); box-shadow:0 0 30px rgba(245,166,35,0.12); }
.feed-wrap.tier-Chadlite { border-color:rgba(123,97,255,0.5); box-shadow:0 0 30px rgba(123,97,255,0.1); }
.feed-wrap.tier-HTN    { border-color:rgba(13,242,200,0.4); box-shadow:0 0 24px rgba(13,242,200,0.08); }
.feed-wrap.tier-MTN    { border-color:rgba(74,158,255,0.4); box-shadow:0 0 24px rgba(74,158,255,0.08); }

/* ── CONFIDENCE BAR ── */
.confidence-bar-wrap {
  position:absolute; bottom:14px; right:14px; z-index:10;
  display:none; flex-direction:column; align-items:flex-end; gap:3px;
}
.confidence-label { font-family:'JetBrains Mono',monospace; font-size:7px; letter-spacing:1.5px; color:var(--muted2); }
.confidence-track { width:80px; height:3px; background:rgba(255,255,255,0.06); border-radius:999px; overflow:hidden; }
.confidence-fill { height:100%; background:linear-gradient(90deg,var(--red),var(--amber),var(--green)); border-radius:999px; width:0%; transition:width 0.6s ease; }

/* ── STREAK BADGE ── */
.streak-badge {
  position:absolute; bottom:14px; right:14px; z-index:10; display:none;
  background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.35);
  border-radius:6px; padding:5px 10px; text-align:center;
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--amber);
  letter-spacing:0.5px;
}

/* ── PEAK ELO TAG ── */
.peak-elo-tag {
  font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(245,166,35,0.6);
  letter-spacing:0.5px; margin-top:3px; display:none;
}

/* ── RANK UP OVERLAY ── */
.rankup-overlay {
  display:none; position:fixed; inset:0; z-index:600;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(20px);
}
.rankup-overlay.show { display:flex; animation:ruFade 0.3s ease; }
@keyframes ruFade { from{opacity:0} to{opacity:1} }
.rankup-box { text-align:center; animation:ruIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes ruIn { from{opacity:0;transform:scale(0.8) translateY(20px)} to{opacity:1;transform:none} }
.ru-icon { font-size:80px; margin-bottom:16px; filter:drop-shadow(0 0 30px rgba(245,166,35,0.6)); animation:ruSpin 0.6s ease; }
@keyframes ruSpin { from{transform:rotate(-10deg) scale(0.6)} to{transform:rotate(0deg) scale(1)} }
.ru-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:4px; color:var(--muted); margin-bottom:8px; }
.ru-tier { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:56px; letter-spacing:-1px; color:#fff; margin-bottom:6px; text-shadow:0 0 40px rgba(245,166,35,0.5); }
.ru-sub { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:24px; }
.ru-close { background:none; border:1px solid rgba(255,255,255,0.12); border-radius:6px; padding:8px 28px; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
.ru-close:hover { color:var(--silver); border-color:rgba(255,255,255,0.2); }
.ru-particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.ru-p { position:absolute; width:4px; height:4px; border-radius:50%; animation:ruP 1.2s ease-out forwards; }
@keyframes ruP { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }

/* ── REMATCH WINDOW ── */
.rematch-banner {
  display:none; position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  z-index:450; background:rgba(0,0,0,0.92); border:1px solid rgba(74,158,255,0.3);
  border-radius:10px; padding:14px 24px; text-align:center; backdrop-filter:blur(16px);
  animation:rmbIn 0.3s ease;
}
@keyframes rmbIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.rematch-banner.show { display:block; }
.rmb-text { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; margin-bottom:10px; }
.rmb-timer { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:28px; color:#fff; margin-bottom:10px; }
.rmb-btn { background:var(--blue); border:none; border-radius:6px; padding:8px 24px; color:#000; font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:opacity 0.2s; }
.rmb-btn:hover { opacity:0.85; }
.rmb-waiting { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--green); margin-top:8px; display:none; }

/* ── MATCHMAKING TOGGLE ── */
.mmk-toggle {
  display:flex; align-items:center; gap:10px;
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2); letter-spacing:1px;
}
.mmk-label { flex-shrink:0; }
.mmk-seg {
  display:flex; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  border-radius:6px; overflow:hidden;
}
.mmk-opt {
  padding:6px 12px; font-family:'JetBrains Mono',monospace; font-size:9px;
  letter-spacing:0.5px; color:var(--muted2); cursor:pointer; transition:all 0.15s;
  border:none; background:transparent; white-space:nowrap;
}
.mmk-opt:hover { color:var(--muted); background:rgba(255,255,255,0.04); }
.mmk-opt.active { background:rgba(74,158,255,0.12); color:var(--blue); }

/* Appeal star in name pill */
.np-appeal { font-family:'JetBrains Mono',monospace; font-size:9px; color:rgba(245,166,35,0.8); margin-top:3px; letter-spacing:0.3px; display:none; }
.daily-banner {
  position:fixed; top:calc(var(--nav-h) + 4px); left:50%; transform:translateX(-50%);
  z-index:290; background:rgba(0,0,0,0.88); border:1px solid rgba(245,158,11,0.3);
  border-radius:8px; padding:8px 18px; display:none; align-items:center; gap:10px;
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.5px; color:var(--amber);
  backdrop-filter:blur(12px); cursor:pointer; transition:border-color 0.2s;
}
.daily-banner:hover { border-color:rgba(245,158,11,0.5); }
.daily-banner.show { display:flex; }
.daily-progress { font-size:12px; font-weight:700; color:#fff; }

</head>
<body>
<div class="page-wrap" style="padding:0;">
<div class="arena-shell">

  <div class="arena-header">
    <div style="display:flex;align-items:center;gap:16px;">
      <a class="arena-back" href="index.html">← HOME</a>
      <div><div class="arena-eyebrow">Ranked Matchmaking</div><div class="arena-title">⚔ 1V1 Arena</div></div>
    </div>
    <div class="arena-online"><div class="arena-online-dot"></div><span class="online-count-val">— online</span></div>
  </div>

  <div class="status-ticker">

/* ═══════════════════════════════
   SOUND ENGINE — Web Audio API
   No assets. All synthesis.
═══════════════════════════════ */
var _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function playTone(freq,type,dur,vol,delay){
  try{
    var ctx=getAudioCtx();
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type||'sine'; o.frequency.value=freq;
    var t=ctx.currentTime+(delay||0);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol||0.12,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
function soundMatchFound(){
  // Rising two-note chime — anticipation
  playTone(440,'sine',0.25,0.10,0);
  playTone(660,'sine',0.35,0.12,0.18);
  playTone(880,'sine',0.5,0.10,0.38);
}
function soundScanBeep(){
  // Short digital sweep
  try{
    var ctx=getAudioCtx();
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(200,ctx.currentTime);
    o.frequency.linearRampToValueAtTime(800,ctx.currentTime+0.15);
    o.frequency.linearRampToValueAtTime(200,ctx.currentTime+0.3);
    g.gain.setValueAtTime(0.07,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    o.start(); o.stop(ctx.currentTime+0.4);
  }catch(e){}
}
function soundWin(){
  // Ascending triumphant chord
  [523,659,784,1047].forEach(function(f,i){playTone(f,'sine',0.6,0.09,i*0.07);});
}
function soundLoss(){
  // Descending minor chord
  [392,330,262].forEach(function(f,i){playTone(f,'sine',0.5,0.08,i*0.1);});
}
function soundScanLock(){
  // Clean double-beep — score locked
  playTone(880,'square',0.08,0.06,0);
  playTone(1100,'square',0.08,0.06,0.12);
}
var _elo=parseInt(localStorage.getItem('mgm_elo')||'400');

function startQTimer(){queueStart=Date.now();if(queueTimer)clearInterval(queueTimer);queueTimer=setInterval(function(){var s=Math.floor((Date.now()-queueStart)/1000);var m=Math.floor(s/60),ss=s%60;document.getElementById('soTimer').textContent=String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');},200);}
function stopQTimer(){if(queueTimer){clearInterval(queueTimer);queueTimer=null;}document.getElementById('soTimer').textContent='00:00';}

function onMsg(msg){
  switch(msg.type){
    case 'queue_joined':
      setS('searching','Searching for opponent...');
      document.getElementById('myFeedWrap').classList.add('searching-state');
      // Hide score pill during search
      document.getElementById('myScorePill').style.display='none';
      document.getElementById('skipBtn').style.display='flex';
      document.getElementById('mainBtn').style.display='none';
      state='searching'; startQTimer(); break;
    case 'queue_update': document.getElementById('qText').textContent=msg.size>0?msg.size+' in queue':''; break;
    case 'match_found':
      stopQTimer();
      document.getElementById('myFeedWrap').classList.remove('searching-state');
      // Show score pill again when match found
      document.getElementById('myScorePill').style.display='block';
      onMatchFound(msg); break;
    case 'match_result': onResult(msg); break;
    case 'score_submitted': setS('searching','Score locked — awaiting opponent...'); break;
    case 'score_error': setS('connected',msg.error||'Scan error'); state='matched'; showScanBtn(true); break;
    case 'opponent_disconnected':
      stopQTimer(); document.getElementById('myFeedWrap').classList.remove('searching-state');
      document.getElementById('myScorePill').style.display='block';
      setS('','Opponent disconnected'); resetOpp(); closeRTC(); state='camera'; showScanBtn(false); document.getElementById('skipBtn').style.display='none'; break;
    case 'opponent_skipped':
      stopQTimer(); document.getElementById('myFeedWrap').classList.remove('searching-state');
      document.getElementById('myScorePill').style.display='block';
      setS('','You were skipped'); resetOpp(); closeRTC(); state='camera'; showScanBtn(false); document.getElementById('skipBtn').style.display='none'; break;
    case 'rtc_timeout':
      document.getElementById('myScorePill').style.display='block';
      setS('','Camera timed out'); resetOpp(); closeRTC(); state='camera'; showScanBtn(false); break;
    case 'rematch_ready':
      // Opponent also clicked rematch — pair them
      rematchOppReady=true;
      var rw=document.getElementById('rmbWaiting'); if(rw) rw.style.display='none';
      setS('connected','Rematch confirmed — rejoining...'); break;
    case 'webrtc_offer': handleOffer(msg); break;
    case 'webrtc_answer': handleAnswer(msg); break;
    case 'webrtc_ice': handleIce(msg); break;
  }
}

function startCam(){

    setS('','Camera denied — allow access to continue');

}

function initFM(v,c){
  faceMesh=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.6});
  faceMesh.onResults(function(r){
    var ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height);
    if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){
      myLandmarks=r.multiFaceLandmarks[0]; drawMesh(c,myLandmarks);
      // Only update score display when NOT searching
      if(state==='camera'||state==='matched'){
        var res=calcScore(myLandmarks); myLastScore=res.score;
        document.getElementById('myScoreVal').textContent=res.score.toFixed(1);
        document.getElementById('myTierVal').textContent=getTierName(scoreToElo(res.score));
        document.getElementById('myDom').textContent=res.dom;
        document.getElementById('myFlaw').textContent=res.flaw;
        document.getElementById('mySym').textContent=Math.round(res.sym*100)+'%';
        updateMogBar(res.score,oppLastScore);
        // Confidence: based on face centering and size
        var nose=myLandmarks[1];
        var faceW=Math.sqrt(Math.pow(myLandmarks[234].x-myLandmarks[454].x,2)+Math.pow(myLandmarks[234].y-myLandmarks[454].y,2));
        var centerDist=Math.sqrt(Math.pow(nose.x-0.5,2)+Math.pow(nose.y-0.48,2));
        var conf=Math.max(0,Math.min(1,(faceW-0.1)*3.5*(1-centerDist*4)));
        var cf=document.getElementById('confFill'); if(cf) cf.style.width=Math.round(conf*100)+'%';
      }
    }else{ myLandmarks=null; }
  });
  fmReady=true;
  (function loop(){if(!fmReady||!myStream)return;faceMesh.send({image:v}).then(function(){requestAnimationFrame(loop);});})();
}

function drawMesh(canvas,lm){
  var ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  var sc=Math.max(0.6,w/1000);
  function p(i){return lm[i]?[lm[i].x*w,lm[i].y*h]:null;}
  function line(ids,col,lw,blur){
    ctx.save();ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
    if(blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}
    var started=false;
    for(var k=0;k<ids.length;k++){var pt=p(ids[k]);if(!pt)continue;if(!started){ctx.moveTo(pt[0],pt[1]);started=true;}else ctx.lineTo(pt[0],pt[1]);}
    if(started)ctx.stroke();ctx.restore();
  }
  function dot(i,r,col,blur){
    var pt=p(i);if(!pt)return;
    ctx.save();ctx.beginPath();ctx.arc(pt[0],pt[1],r,0,Math.PI*2);ctx.fillStyle=col;
    if(blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}
    ctx.fill();ctx.restore();
  }
  function poly(ids,fillCol,strokeCol,lw,blur){
    var pts=ids.map(function(i){return p(i);}).filter(Boolean);if(pts.length<2)return;
    ctx.save();ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for(var k=1;k<pts.length;k++)ctx.lineTo(pts[k][0],pts[k][1]);
    ctx.closePath();
    if(fillCol){ctx.fillStyle=fillCol;ctx.fill();}
    if(strokeCol){ctx.strokeStyle=strokeCol;ctx.lineWidth=lw||1;if(blur){ctx.shadowColor=strokeCol;ctx.shadowBlur=blur;}ctx.stroke();}
    ctx.restore();
  }

  ctx.save();
  ctx.globalCompositeOperation='source-over';

  // ── Subtle mesh tessellation (fine, low-opacity) ──
  var TESS=[[10,338],[338,297],[297,332],[332,284],[284,251],[251,389],[389,356],[356,454],[454,323],[323,361],[361,288],[288,397],[397,365],[365,379],[379,378],[378,400],[400,377],[377,152],[152,148],[148,176],[176,149],[149,150],[150,136],[136,172],[172,58],[58,132],[132,93],[93,234],[234,127],[127,162],[162,21],[21,54],[54,103],[103,67],[67,109],[109,10],[10,151],[151,9],[9,8],[8,168],[168,6],[6,197],[197,195],[195,5],[5,4],[4,1],[1,19],[19,94],[94,2],[2,164],[164,0],[0,11],[11,12],[12,13],[13,14],[14,15],[15,16],[16,17],[17,18],[18,200],[200,199],[199,175],[175,152],[152,377],[377,400],[400,378],[33,7],[7,163],[163,144],[144,145],[145,153],[153,154],[154,155],[155,133],[133,173],[173,157],[157,158],[158,159],[159,160],[160,161],[161,246],[246,33],[362,382],[382,381],[381,380],[380,374],[374,373],[373,390],[390,249],[249,263],[263,466],[466,388],[388,387],[387,386],[386,385],[385,384],[384,398],[398,362]];
  ctx.strokeStyle='rgba(74,158,255,0.09)';ctx.lineWidth=0.5*sc;ctx.shadowBlur=0;
  TESS.forEach(function(e){var a=p(e[0]),b=p(e[1]);if(!a||!b)return;ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();});

  // ── Feature zone fills (very subtle glow zones) ──
  // Eye sockets
  var LEye=[33,246,161,160,159,158,157,173,133,155,154,153,145,144,163,7];
  var REye=[362,398,384,385,386,387,388,466,263,249,390,373,374,380,381,382];
  poly(LEye,'rgba(74,158,255,0.04)','rgba(74,158,255,0.25)',1*sc,8);
  poly(REye,'rgba(74,158,255,0.04)','rgba(74,158,255,0.25)',1*sc,8);

  // ── Eyebrows with glow ──
  line([70,63,105,66,107,55,65],'rgba(180,220,255,0.7)',1.8*sc,10);
  line([336,296,334,293,300,285,295],'rgba(180,220,255,0.7)',1.8*sc,10);

  // ── Eye contours — bright, prominent ──
  line([33,246,161,160,159,158,157,173,133],'rgba(255,255,255,0.9)',1.4*sc,14);
  line([362,398,384,385,386,387,388,466,263],'rgba(255,255,255,0.9)',1.4*sc,14);
  line([133,155,154,153,145,144,163,7,33],'rgba(140,200,255,0.6)',1*sc,6);
  line([263,249,390,373,374,380,381,382,362],'rgba(140,200,255,0.6)',1*sc,6);

  // Eye pupils as glowing circles
  var lEyeCenter=p(468)||p(159);var rEyeCenter=p(473)||p(386);
  if(lEyeCenter){ctx.save();ctx.beginPath();ctx.arc(lEyeCenter[0],lEyeCenter[1],4*sc,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.95)';ctx.shadowColor='rgba(74,158,255,1)';ctx.shadowBlur=12;ctx.fill();ctx.restore();}
  if(rEyeCenter){ctx.save();ctx.beginPath();ctx.arc(rEyeCenter[0],rEyeCenter[1],4*sc,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.95)';ctx.shadowColor='rgba(74,158,255,1)';ctx.shadowBlur=12;ctx.fill();ctx.restore();}

  // ── Nose bridge + tip prominent ──
  line([168,6,197,195,5,4,1,19,94,2],'rgba(200,230,255,0.65)',1.4*sc,8);
  line([64,98,97,2,326,327,294],'rgba(150,200,255,0.4)',0.8*sc,4);
  // Nostril outline
  line([218,219,220,237,44,1,274,278,279,360,355,429],'rgba(150,200,255,0.5)',0.9*sc,3);

  // ── Lips — glowing outline ──
  line([61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146,61],'rgba(255,255,255,0.75)',1.6*sc,10);
  line([61,185,40,39,37,0,267,269,270,409,291],'rgba(220,240,255,0.8)',1.2*sc,6);
  line([291,375,321,405,314,17,84,181,91,146,61],'rgba(180,220,255,0.55)',1*sc,4);

  // ── Jawline — strong glow arc ──
  line([234,93,132,58,172,136,150,149,176,148,152,377,400,378,379,365,397,288,361,323,454],'rgba(74,200,255,0.8)',2.2*sc,16);
  // Double line for depth
  line([234,93,132,58,172,136,150,149,176,148,152,377,400,378,379,365,397,288,361,323,454],'rgba(255,255,255,0.3)',0.6*sc,0);

  // ── Cheekbone accent lines ──
  line([116,117,118,119,120,121,128,234],'rgba(74,158,255,0.35)',0.9*sc,6);
  line([345,346,347,348,349,350,451,454],'rgba(74,158,255,0.35)',0.9*sc,6);

  // ── Forehead horizontal structure lines ──
  line([10,109,67,103,54,21,162,127,234],'rgba(74,158,255,0.22)',0.7*sc,4);
  line([338,297,332,284,251,389,356,454],'rgba(74,158,255,0.22)',0.7*sc,4);

  // ── All landmark dots — tiny, dim ──
  ctx.save();
  ctx.fillStyle='rgba(74,158,255,0.35)';ctx.shadowBlur=0;
  for(var i=0;i<lm.length;i++){var pt2=p(i);if(!pt2)continue;ctx.beginPath();ctx.arc(pt2[0],pt2[1],0.65*sc,0,Math.PI*2);ctx.fill();}
  ctx.restore();

  // ── Key anchor points — bright with glow ──
  var anchors=[10,33,133,362,263,1,61,291,152,234,454,172,397,70,300,168,4,0,17];
  anchors.forEach(function(i){dot(i,2.2*sc,'rgba(255,255,255,0.95)',18);dot(i,1*sc,'rgba(74,158,255,1)',0);});

  // ── Corner scan brackets ──
  if(lm[234]&&lm[454]&&lm[10]&&lm[152]){
    var xl=lm[234].x*w-14,xr=lm[454].x*w+14,yt=lm[10].y*h-18,yb=lm[152].y*h+14;
    var bk=Math.min(22,(xr-xl)*0.12);
    ctx.save();ctx.strokeStyle='rgba(74,200,255,0.9)';ctx.lineWidth=2*sc;ctx.shadowColor='rgba(74,200,255,0.8)';ctx.shadowBlur=10;ctx.lineCap='round';
    [[xl,yt,1,1],[xr,yt,-1,1],[xl,yb,1,-1],[xr,yb,-1,-1]].forEach(function(c){
      ctx.beginPath();ctx.moveTo(c[0]+bk*c[2],c[1]);ctx.lineTo(c[0],c[1]);ctx.lineTo(c[0],c[1]+bk*c[3]);ctx.stroke();
    });
    ctx.restore();
  }

  ctx.restore();
}

function calcScore(lm){
  function dist(a,b){return Math.sqrt(Math.pow(lm[a].x-lm[b].x,2)+Math.pow(lm[a].y-lm[b].y,2));}
  var nose=lm[1];
  var pairs=[[33,263],[130,359],[159,386],[145,374],[61,291],[234,454],[58,288],[172,397]];
  var d=0,cnt=0;
  for(var i=0;i<pairs.length;i++){var l=pairs[i][0],r=pairs[i][1];if(lm[l]&&lm[r]){d+=Math.abs(Math.abs(nose.x-lm[l].x)-Math.abs(lm[r].x-nose.x));cnt++;}}
  var sym=Math.max(0,Math.min(1,1-(d/cnt)*16));
  var jaw=Math.max(0,Math.min(1,1-Math.abs(dist(234,454)/dist(10,152)-0.75)*4));
  var li=lm[133],lo=lm[33],ri=lm[362],ro=lm[263];
  var tilt=li&&lo&&ri&&ro?((li.y-lo.y)+(ri.y-ro.y))/2:0;
  var canthal=Math.max(0,Math.min(1,0.5+tilt*18));
  var cheek=Math.max(0,Math.min(1,1-Math.abs(dist(234,454)/Math.max(dist(130,359),0.001)-1.05)*4));
  var eye=Math.max(0,Math.min(1,1-Math.abs(dist(133,362)/Math.max(dist(234,454),0.001)-0.32)*10));
  var total=(sym*3+jaw*2+canthal*1.8+cheek*1.2+eye*0.8)/8.8;
  var score=Math.min(10,Math.max(1,total*9+(Math.random()-0.5)*0.4));
  var metrics=[{n:'Symmetry',v:sym},{n:'Jawline',v:jaw},{n:'Canthal',v:canthal},{n:'Cheekbones',v:cheek},{n:'Eye Set',v:eye}];
  metrics.sort(function(a,b){return b.v-a.v;});
  var domM={'Symmetry':'Strong Symmetry','Jawline':'Sharp Jawline','Canthal':'Hunter Eyes','Cheekbones':'High Cheekbones','Eye Set':'Ideal Eye Set'};
  var flawM={'Symmetry':'Asymmetry','Jawline':'Weak Jaw','Canthal':'Downturned Eyes','Cheekbones':'Flat Cheeks','Eye Set':'Eye Spacing'};
  return {score:score,sym:sym,dom:domM[metrics[0].n]||metrics[0].n,flaw:flawM[metrics[metrics.length-1].n]||metrics[metrics.length-1].n};
}
function scoreToElo(s){if(s>=9.5)return 5001;if(s>=8.5)return 3501;if(s>=7.5)return 2001;if(s>=6.5)return 1501;if(s>=5.5)return 1001;if(s>=4.5)return 501;return 200;}
function updateMogBar(my,opp){var t=my+opp;if(t<0.1)return;var p=(my/t)*100;document.getElementById('mogFillL').style.width=p+'%';document.getElementById('mogFillR').style.width=(100-p)+'%';}

function setMMK(pref){
  mmkPref=pref;
  document.querySelectorAll('.mmk-opt').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById('mmk-'+pref); if(el) el.classList.add('active');
}

function findMatch(){
  if(!myStream||state==='searching')return;
  if(!wsSend({type:'join_queue',mmkPref:mmkPref})){setS('searching','Connecting...');setTimeout(findMatch,700);return;}
}
function cancelSearch(){
  stopQTimer(); wsSend({type:'leave_queue'});
  document.getElementById('myFeedWrap').classList.remove('searching-state');
  document.getElementById('skipBtn').style.display='none';
  var btn=document.getElementById('mainBtn'); btn.style.display='block'; btn.disabled=false; btn.textContent='Find Match →'; btn.onclick=mainAction;
  state='camera'; setS('','Camera active — find a match');
}
function showScanBtn(scan){
  var btn=document.getElementById('mainBtn'); btn.style.display='block';
  if(scan){btn.disabled=false;btn.textContent='Run Scan';btn.onclick=runScan;}
  else{btn.disabled=false;btn.textContent='Find Match →';btn.onclick=mainAction;}
}
function onMatchFound(msg){
  state='matched'; var opp=msg.opponent||{}; oppSocketId=opp.id; myRole=msg.role;
  var t=opp.tier||{name:'Sub3',emoji:'🔴'};
  setS('connected','Matched: '+(opp.name||'Opponent')+' · '+t.emoji+' '+t.name+' · '+(opp.elo||400)+' ELO');
  document.getElementById('oppPHText').textContent=(opp.name||'Opponent')+' · Connecting...';
  document.getElementById('oppTRName').textContent=opp.name||'Opponent';
  document.getElementById('oppTRElo').textContent=(opp.elo||400)+' ELO · '+t.name;
  document.getElementById('oppMogName').textContent=opp.name||'Opp';
  // Public appeal
  var appealEl=document.getElementById('oppAppeal');
  if(appealEl&&opp.appealSum&&opp.appealCount&&opp.appealCount>=3){
    var avg=(opp.appealSum/opp.appealCount).toFixed(1);
    appealEl.textContent='⭐ '+avg+' appeal';
    appealEl.style.display='block';
  } else if(appealEl){ appealEl.style.display='none'; }
  soundMatchFound();
  showScanBtn(true); document.getElementById('skipBtn').style.display='flex';
  startRTC();
}
function startRTC(){
  closeRTC(); peerConn=new RTCPeerConnection(ICE);
  if(myStream) myStream.getTracks().forEach(function(t){peerConn.addTrack(t,myStream);});
  peerConn.ontrack=function(e){
    var v=document.getElementById('oppVid'); v.srcObject=e.streams[0]; v.style.display='block';
    document.getElementById('oppPH').style.display='none';
    document.getElementById('oppScorePill').style.display='block';
    document.getElementById('oppNamePill').style.display='block';
    document.getElementById('reportBtn').style.display='block';
    document.getElementById('oppFeedWrap').classList.add('active');
    setS('connected','Cameras live — run your scan'); wsSend({type:'webrtc_connected'});
  };
  peerConn.onicecandidate=function(e){if(e.candidate)wsSend({type:'webrtc_ice',targetId:oppSocketId,candidate:e.candidate});};
  if(myRole==='offerer'){
    peerConn.createOffer({offerToReceiveVideo:true,offerToReceiveAudio:false}).then(function(o){return peerConn.setLocalDescription(o);}).then(function(){wsSend({type:'webrtc_offer',targetId:oppSocketId,offer:peerConn.localDescription});});
  }
}
function handleOffer(msg){if(!peerConn)return;peerConn.setRemoteDescription(new RTCSessionDescription(msg.offer)).then(function(){return peerConn.createAnswer();}).then(function(a){return peerConn.setLocalDescription(a);}).then(function(){wsSend({type:'webrtc_answer',targetId:msg.fromId,answer:peerConn.localDescription});});}
function handleAnswer(msg){if(!peerConn)return;peerConn.setRemoteDescription(new RTCSessionDescription(msg.answer));}
function handleIce(msg){if(!peerConn||!msg.candidate)return;peerConn.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(function(){});}
function closeRTC(){if(peerConn){peerConn.close();peerConn=null;}oppSocketId=null;myRole=null;}

function runScan(){
  if(!myLandmarks){setS('connected','⚠ Center your face — face not detected');return;}
  state='scanning'; var btn=document.getElementById('mainBtn'); btn.textContent='Scanning...'; btn.disabled=true;
  document.getElementById('myFeedWrap').classList.add('scanning');
  setS('searching','Analyzing facial structure...');
  soundScanBeep();
  setTimeout(function(){
    document.getElementById('myFeedWrap').classList.remove('scanning');
    var res=calcScore(myLandmarks); myLastScore=res.score;
    document.getElementById('myScoreVal').textContent=res.score.toFixed(1);
    document.getElementById('myTierVal').textContent=getTierName(scoreToElo(res.score));
    document.getElementById('myDom').textContent=res.dom; document.getElementById('myFlaw').textContent=res.flaw;
    updateMogBar(res.score,oppLastScore);
    wsSend({type:'submit_score',score:res.score});
    soundScanLock();
    setS('searching','Score locked — awaiting opponent...');
  },2800);
}

function onResult(msg){
  state='result'; myLastScore=msg.myScore||0; oppLastScore=msg.opponentScore||0;
  updateMogBar(myLastScore,oppLastScore);
  var oppElo=parseInt(document.getElementById('oppTRElo').textContent)||400;
  document.getElementById('oppScoreVal').textContent=oppLastScore.toFixed(1);
  document.getElementById('oppTierVal').textContent=getTierName(scoreToElo(oppLastScore));
  document.getElementById('rMy').textContent=myLastScore.toFixed(1);
  document.getElementById('rOpp').textContent=oppLastScore.toFixed(1);
  document.getElementById('rOppLbl').textContent=(document.getElementById('oppTRName').textContent||'OPP').toUpperCase();
  var won=!!msg.won;
  document.getElementById('rVerdict').textContent=won?'VICTORY':'DEFEATED';
  document.getElementById('rVerdict').className='result-verdict '+(won?'win':'loss');
  document.getElementById('rBy').textContent=(won?'OVER ':'BY ')+document.getElementById('oppTRName').textContent.toUpperCase();
  document.getElementById('rsMyBlock').className='rs-block '+(won?'ws':'ls');
  document.getElementById('rsOppBlock').className='rs-block '+(won?'ls':'ws');
  var chg=msg.eloChange||0;
  document.getElementById('rMyElo').innerHTML='<span style="color:'+(chg>=0?'#22c55e':'#ef4444')+'">'+(chg>=0?'+':'')+chg+' ELO</span>';
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('mainBtn').style.display='none'; document.getElementById('skipBtn').style.display='none';
  // Play result sound
  setTimeout(function(){ won ? soundWin() : soundLoss(); }, 300);

  // Update ELO and check rank-up
  var newElo=msg.newElo||(_elo+chg);
  var newTier=getTierName(newElo);
  var tierOrder=['Molecule','Sub3','LTN','MTN','HTN','Chadlite','Chad','Slayer'];
  var oldIdx=tierOrder.indexOf(prevTier), newIdx=tierOrder.indexOf(newTier);
  if(newIdx>oldIdx && prevTier) setTimeout(function(){showRankUp(newTier);},1200);
  prevTier=newTier; _elo=newElo;

  // Streak
  if(won){winStreak++;localStorage.setItem('mgm_winStreak',winStreak);}
  else{winStreak=0;localStorage.setItem('mgm_winStreak',0);}
  updateStreakBadge();

  // Peak ELO
  if(newElo>peakElo){peakElo=newElo;localStorage.setItem('mgm_peakElo',peakElo);}

  // Daily challenge
  if(won&&oppElo>_elo-chg){
    dailyWins++;
    localStorage.setItem('mgm_daily',JSON.stringify({date:dailyDate,wins:dailyWins}));
    updateDailyBanner();
    if(dailyWins>=DAILY_GOAL){setTimeout(showDailyComplete,800);}
  }

  // Start rematch window
  startRematchWindow();
}

function showRankUp(tier){
  var icons={Slayer:'💀',Chad:'👑',Chadlite:'🔥',HTN:'⭐',MTN:'⚡',LTN:'🌙',Sub3:'🔴',Molecule:'🧪'};
  document.getElementById('ruIcon').textContent=icons[tier]||'🏆';
  document.getElementById('ruTier').textContent=tier.toUpperCase();
  document.getElementById('ruSub').textContent='You\'ve climbed to '+tier;
  document.getElementById('rankupOverlay').classList.add('show');
  // Spawn particles
  var pc=document.getElementById('ruParticles');
  if(pc){
    pc.innerHTML='';
    var colors=['#f5a623','#ff3d6b','#4A9EFF','#0df2c8','#7b61ff'];
    for(var i=0;i<24;i++){
      var p=document.createElement('div'); p.className='ru-p';
      var tx=(Math.random()-0.5)*400, ty=(Math.random()-0.5)*400;
      p.style.cssText='left:50%;top:50%;background:'+colors[i%colors.length]+';--tx:'+tx+'px;--ty:'+ty+'px;animation-delay:'+(Math.random()*0.4)+'s;';
      pc.appendChild(p);
    }
  }
}

function startRematchWindow(){
  rematchRequested=false; rematchOppReady=false;
  var banner=document.getElementById('rematchBanner');
  var timerEl=document.getElementById('rmbTimer');
  var waitEl=document.getElementById('rmbWaiting');
  if(!banner||!timerEl) return;
  banner.classList.add('show');
  var t=10;
  timerEl.textContent=t;
  if(waitEl) waitEl.style.display='none';
  rematchTimer=setInterval(function(){
    t--;
    timerEl.textContent=t;
    if(t<=0){clearInterval(rematchTimer);banner.classList.remove('show');}
  },1000);
}

function requestRematch(){
  rematchRequested=true;
  document.getElementById('rmbWaiting').style.display='block';
  wsSend({type:'request_rematch',targetId:oppSocketId});
}

function updateDailyBanner(){
  var el=document.getElementById('dailyBanner');
  var prog=document.getElementById('dailyProgress');
  if(!el) return;
  if(dailyWins<DAILY_GOAL){el.classList.add('show');if(prog)prog.textContent=dailyWins+'/'+DAILY_GOAL;}
  else{el.classList.remove('show');}
}

function showDailyComplete(){
  // Show brief toast
  var toast=document.createElement('div');
  toast.style.cssText='position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:700;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);border-radius:8px;padding:14px 24px;font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#f59e0b;letter-spacing:1px;text-align:center;backdrop-filter:blur(12px);animation:rmbIn 0.3s ease;';
  toast.innerHTML='🎯 DAILY CHALLENGE COMPLETE<br><span style="font-size:9px;color:var(--muted);">Streak defended · Badge earned</span>';
  document.body.appendChild(toast);
  setTimeout(function(){toast.remove();},4000);
}

function toggleDailyModal(){}

function rematch(){
  if(rematchTimer) clearInterval(rematchTimer);
  document.getElementById('rematchBanner').classList.remove('show');
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('mainBtn').style.display='block';
  state='camera'; setS('','Finding next opponent...'); showScanBtn(false);
  oppLastScore=0; updateMogBar(myLastScore,0); resetOpp(); setTimeout(findMatch,300);
}
function skipOpp(){stopQTimer();wsSend({type:'skip_opponent'});resetOpp();closeRTC();state='camera';setS('','Finding new opponent...');document.getElementById('myFeedWrap').classList.remove('searching-state');showScanBtn(false);document.getElementById('skipBtn').style.display='none';setTimeout(findMatch,300);}
function resetOpp(){var v=document.getElementById('oppVid');v.srcObject=null;v.style.display='none';document.getElementById('oppPH').style.display='flex';document.getElementById('oppPHText').textContent='Waiting for opponent...';document.getElementById('oppScorePill').style.display='none';document.getElementById('oppNamePill').style.display='none';document.getElementById('reportBtn').style.display='none';document.getElementById('oppFeedWrap').classList.remove('active');}
function reportOpp(){if(confirm('Report this opponent?')){wsSend({type:'report_user',targetId:oppSocketId,reason:'inappropriate'});alert('Report submitted.');}}
function setS(type,text){var d=document.getElementById('sDot');d.className='st-dot'+(type?' '+type:'');document.getElementById('sText').textContent=text;}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — Messages</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.msg-wrap { max-width:1080px; margin:0 auto; }

/* Full-height message shell */
.msg-shell {
  display:grid; grid-template-columns:320px 1fr;
  background:
    linear-gradient(140deg, rgba(74,158,255,0.055), transparent 34%),
    var(--glass);
  border:1px solid rgba(74,158,255,0.14); border-radius:10px;
  overflow:hidden; height:calc(100vh - 140px); min-height:520px;
  box-shadow:0 0 44px rgba(74,158,255,0.08), 0 24px 90px rgba(0,0,0,0.38);
}

/* ── INBOX ── */
.inbox {
  border-right:1px solid rgba(74,158,255,0.12);
  display:flex; flex-direction:column; background:linear-gradient(180deg, rgba(74,158,255,0.045), transparent 30%), var(--bg1);
}
.inbox-head {
  padding:18px; border-bottom:1px solid rgba(74,158,255,0.1);
  display:flex; align-items:center; justify-content:space-between;
}
.inbox-head-title { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; color:var(--white); }
.inbox-count { font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 8px; border-radius:999px; background:var(--blue-dim); color:var(--blue); letter-spacing:0.5px; box-shadow:0 0 16px rgba(74,158,255,0.16); }
.inbox-list { flex:1; overflow-y:auto; }
.inbox-empty { padding:32px 16px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2); letter-spacing:0.5px; line-height:1.8; }

.convo-item {
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.03);
  transition:background 0.15s; position:relative;
}
.convo-item:hover { background:rgba(74,158,255,0.045); }
.convo-item.active { background:rgba(74,158,255,0.07); border-left:2px solid var(--blue); padding-left:12px; }
.convo-av {
  width:42px; height:42px; border-radius:50%; background:var(--bg4);
  border:1px solid var(--border2); display:flex; align-items:center; justify-content:center;
  font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700;
  color:var(--blue); overflow:hidden; flex-shrink:0; box-shadow:0 0 18px rgba(74,158,255,0.14);
}
.convo-av img { width:100%; height:100%; object-fit:cover; }
.convo-info { flex:1; min-width:0; }
.convo-name { font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; color:var(--silver); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.convo-preview { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.convo-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.convo-time { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted2); }
.convo-badge { min-width:18px; height:18px; border-radius:9px; background:var(--blue); color:#000; font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 5px; box-shadow:0 0 14px rgba(74,158,255,0.4); }

/* ── CONVERSATION PANE ── */
.convo-pane {
  display:flex; flex-direction:column;
  background:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px),
    #000;
  background-size:42px 42px;
}

.convo-head {
  padding:16px 20px; border-bottom:1px solid rgba(74,158,255,0.1);
  display:flex; align-items:center; gap:12px; background:rgba(8,8,8,0.92);
  flex-shrink:0;
}
.convo-head-av { width:40px; height:40px; border-radius:50%; background:var(--bg4); border:1px solid rgba(74,158,255,0.2); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; color:var(--blue); overflow:hidden; flex-shrink:0; box-shadow:0 0 20px rgba(74,158,255,0.14); }
.convo-head-av img { width:100%; height:100%; object-fit:cover; }
.convo-head-name { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; color:var(--white); }
.convo-head-status { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2); margin-top:1px; }
.convo-head-link { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); text-decoration:none; letter-spacing:0.5px; transition:color 0.2s; }
.convo-head-link:hover { color:var(--blue); }

.convo-msgs {
  flex:1; overflow-y:auto; padding:20px 22px;
  display:flex; flex-direction:column; gap:6px;
  scrollbar-width:thin; scrollbar-color:var(--bg4) transparent;
}
.convo-msgs::-webkit-scrollbar { width:3px; }
.convo-msgs::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:999px; }

.msg-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2); letter-spacing:0.5px; text-align:center; padding:20px; }
.msg-empty-icon { font-size:32px; opacity:0.3; }

/* Day separator */
.day-sep { text-align:center; margin:10px 0; }
.day-sep span { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--muted2); background:var(--bg2); padding:2px 10px; border-radius:999px; }

/* Bubbles */
.bubble-wrap { display:flex; flex-direction:column; max-width:72%; }
.bubble-wrap.out { align-self:flex-end; align-items:flex-end; }
.bubble-wrap.in { align-self:flex-start; align-items:flex-start; }
.bubble {
  padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5;
  color:var(--silver); word-break:break-word;
}
.bubble.in { background:rgba(255,255,255,0.055); border:1px solid rgba(255,255,255,0.08); border-bottom-left-radius:3px; }
.bubble.out { background:linear-gradient(135deg, var(--blue), #7bb8ff); color:#000; font-weight:600; border-bottom-right-radius:3px; box-shadow:0 0 22px rgba(74,158,255,0.18); }
.bubble-time { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted2); margin-top:3px; padding:0 2px; }
.bubble-wrap.out .bubble-time { text-align:right; }

/* Compose */
.compose-wrap { border-top:1px solid rgba(74,158,255,0.12); padding:14px 16px; display:flex; gap:8px; flex-shrink:0; background:rgba(8,8,8,0.94); }
.compose-input {
  flex:1; background:rgba(255,255,255,0.04); border:1px solid var(--border2); border-radius:8px;
  padding:12px 14px; font-family:'Inter',sans-serif; font-size:14px; color:var(--white);
  outline:none; resize:none; transition:border-color 0.2s; max-height:100px; overflow-y:auto;
}
.compose-input:focus { border-color:rgba(74,158,255,0.3); }
.compose-input::placeholder { color:var(--muted2); }
.compose-send {
  width:44px; height:44px; border-radius:8px; border:none; background:var(--blue);
  color:#000; font-size:15px; cursor:pointer; flex-shrink:0; transition:opacity 0.2s;
  display:flex; align-items:center; justify-content:center; align-self:flex-end;
  box-shadow:0 0 18px rgba(74,158,255,0.25);
}
.compose-send:hover { opacity:0.85; }
.compose-send:disabled { opacity:0.3; cursor:not-allowed; }

/* No conversation selected */
.no-convo {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted2);
  letter-spacing:0.5px; text-align:center; padding:20px;
}
.no-convo-icon { font-size:36px; opacity:0.2; margin-bottom:4px; }

/* Error banner */
.msg-error {
  margin:10px 18px; padding:10px 14px; background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.2); border-radius:6px;
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--red); letter-spacing:0.3px; display:none;
}

@media(max-width:700px){
  .msg-shell{grid-template-columns:1fr;}
  .msg-shell.has-convo .inbox{display:none;}
  .msg-shell:not(.has-convo) .convo-pane{display:none;}
}
</style>
</head>
<body>
<div class="page-wrap">
<div class="msg-wrap">

  <div class="msg-shell" id="msgShell">

    <!-- INBOX -->
    <div class="inbox">
      <div class="inbox-head">
        <div class="inbox-head-title">Messages</div>
        <div class="inbox-count" id="inboxCount">0</div>
      </div>
      <div class="inbox-list" id="inboxList">
        <div class="inbox-empty" id="inboxEmpty">
          <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div class="skeleton-text-wrap"><div class="skeleton skeleton-text long"></div><div class="skeleton skeleton-text short"></div></div></div>
          <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div class="skeleton-text-wrap"><div class="skeleton skeleton-text long"></div><div class="skeleton skeleton-text short"></div></div></div>
          <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div class="skeleton-text-wrap"><div class="skeleton skeleton-text long"></div><div class="skeleton skeleton-text short"></div></div></div>
        </div>
      </div>
    </div>

    <!-- CONVERSATION PANE -->
    <div class="convo-pane">
      <div class="no-convo" id="noConvo">
        <div class="no-convo-icon">✉</div>
        <div>Select a conversation</div>
        <div style="color:var(--muted2);font-size:9px;margin-top:4px;">or visit a user profile to start one</div>
      </div>
      <div id="activeConvo" style="display:none;flex:1;display:none;flex-direction:column;">
        <div class="convo-head" id="convoHead">
          <div class="convo-head-av" id="convoHeadAv">?</div>
          <div>
            <div class="convo-head-name" id="convoHeadName">—</div>
            <div class="convo-head-status" id="convoHeadStatus">—</div>
          </div>
          <a class="convo-head-link" id="convoHeadLink" href="#">View profile →</a>
        </div>
        <div class="msg-error" id="msgError"></div>
        <div class="convo-msgs" id="convoMsgs"></div>
        <div class="compose-wrap">
          <input type="text" class="compose-input" id="composeInput" placeholder="Message..." maxlength="400" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
          <button class="compose-send" onclick="sendMsg()" id="sendBtn">➤</button>
        </div>
      </div>
    </div>

  </div>

</div>
</div>

<script src="shared.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection,
         query, where, orderBy, limit, getDocs, addDoc, serverTimestamp,
         onSnapshot, increment }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyBpMuv59Rlhc2roSiTPBzjKKHjuwqe0TFs",
  authDomain:"mogmetv.firebaseapp.com", projectId:"mogmetv",
  storageBucket:"mogmetv.firebasestorage.app",
  messagingSenderId:"1067675943117",
  appId:"1:1067675943117:web:9545a8bbfa7f68d5db2984"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

injectSharedUI();
connectWS();

let _user = null, _profile = null;
let _activeConvoId = null, _activeOther = null;
let _inboxUnsub = null, _convoUnsub = null;

function convoId(a, b){ return [a,b].sort().join('_'); }

function showError(msg){ const el=document.getElementById('msgError'); el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',5000); }

onAuthStateChanged(auth, async (user) => {
  if(!user){ window.location.href='index.html'; return; }
  _user = user;
  try {
    const snap = await getDoc(doc(db,'users',user.uid));
    if(snap.exists()) _profile = snap.data();
  } catch(e){}
  loadInbox();
  // Auto-open from URL ?to=username
  const toUser = new URLSearchParams(location.search).get('to');
  if(toUser) openWithUsername(toUser.toLowerCase());
});

async function openWithUsername(uname){
  try {
    const usnap = await getDoc(doc(db,'usernames',uname));
    if(!usnap.exists()){ showError('User not found'); return; }
    const uid = usnap.data().uid;
    if(uid===_user.uid) return;
    const psnap = await getDoc(doc(db,'users',uid));
    if(!psnap.exists()) return;
    const other = psnap.data();
    const cid = convoId(_user.uid, uid);
    // Create conversation doc if it doesn't exist
    const cref = doc(db,'conversations',cid);
    const cdoc = await getDoc(cref);
    if(!cdoc.exists()){
      await setDoc(cref,{
        participants:[_user.uid,uid].sort(),
        lastMessage:'', lastAt:serverTimestamp(),
        unread:{[_user.uid]:0,[uid]:0},
        names:{[_user.uid]:_profile?.username||'Me',[uid]:other.username||'User'},
        photos:{[_user.uid]:_profile?.photoURL||'',[uid]:other.photoURL||''},
      });
    }
    openConvo(cid,{uid,username:other.username,photoURL:other.photoURL});
  } catch(e){ showError('Could not open conversation: '+e.message); }
}

function loadInbox(){
  if(_inboxUnsub) _inboxUnsub();
  const q = query(collection(db,'conversations'), where('participants','array-contains',_user.uid), limit(50));
  _inboxUnsub = onSnapshot(q, (snap) => {
    const list = document.getElementById('inboxList');
    const empty = document.getElementById('inboxEmpty');
    if(snap.empty){
      empty.style.display='block'; empty.textContent='No conversations yet.\nVisit a user profile to send a message.';
      document.getElementById('inboxCount').textContent='0';
      if(window.updateInboxBadge) window.updateInboxBadge(0);
      return;
    }
    empty.style.display='none';
    document.getElementById('inboxCount').textContent=snap.size;
    // Sort by lastAt desc client-side
    const docs = snap.docs.slice().sort((a,b)=>{
      const ta=a.data().lastAt?.toMillis?a.data().lastAt.toMillis():0;
      const tb=b.data().lastAt?.toMillis?b.data().lastAt.toMillis():0;
      return tb-ta;
    });
    list.innerHTML='';
    let totalUnread=0;
    docs.forEach(d=>{
      const c=d.data(), myUid=_user.uid;
      const otherId=(c.participants||[]).find(p=>p!==myUid)||'';
      const oName=c.names?.[otherId]||'Unknown';
      const oPhoto=c.photos?.[otherId]||'';
      const unread=(c.unread?.[myUid])||0;
      totalUnread+=unread;
      const when=c.lastAt?.toDate?fmtTime(c.lastAt.toDate()):'';
      const el=document.createElement('div');
      el.className='convo-item'+(d.id===_activeConvoId?' active':'');
      el.innerHTML=`
        <div class="convo-av">${oPhoto?`<img src="${esc(oPhoto)}">`:(oName[0]||'?').toUpperCase()}</div>
        <div class="convo-info">
          <div class="convo-name">${esc(oName)}</div>
          <div class="convo-preview">${esc((c.lastMessage||'').slice(0,60))||'— start the conversation —'}</div>
        </div>
        <div class="convo-meta">
          <div class="convo-time">${when}</div>
          ${unread>0?`<div class="convo-badge">${unread}</div>`:''}
        </div>`;
      el.onclick=()=>openConvo(d.id,{uid:otherId,username:oName,photoURL:oPhoto});
      list.appendChild(el);
    });
    if(window.updateInboxBadge) window.updateInboxBadge(totalUnread);
  }, (err)=>{ console.error('Inbox error:',err); showError('Could not load inbox. Check Firestore rules.'); });
}

function openConvo(cid, other){
  _activeConvoId=cid; _activeOther=other;
  document.getElementById('msgShell').classList.add('has-convo');
  // Mark read
  updateDoc(doc(db,'conversations',cid),{[`unread.${_user.uid}`]:0}).catch(()=>{});
  // Header
  const av=document.getElementById('convoHeadAv');
  av.innerHTML=other.photoURL?`<img src="${esc(other.photoURL)}">`:(other.username||'?')[0].toUpperCase();
  document.getElementById('convoHeadName').textContent=other.username||'User';
  document.getElementById('convoHeadStatus').textContent='Direct message';
  document.getElementById('convoHeadLink').href=`user.html?u=${encodeURIComponent(other.username||'')}`;
  // Show pane
  document.getElementById('noConvo').style.display='none';
  const ac=document.getElementById('activeConvo'); ac.style.display='flex'; ac.style.flexDirection='column';
  // Highlight in inbox
  document.querySelectorAll('.convo-item').forEach(el=>el.classList.remove('active'));
  // Subscribe to messages
  if(_convoUnsub) _convoUnsub();
  const q=query(collection(db,'conversations',cid,'messages'),orderBy('createdAt','asc'),limit(100));
  _convoUnsub=onSnapshot(q,(snap)=>{
    const wrap=document.getElementById('convoMsgs');
    if(snap.empty){wrap.innerHTML='<div class="msg-empty"><div class="msg-empty-icon">👋</div><div>No messages yet</div><div style="font-size:9px;color:var(--muted2);margin-top:4px;">Say something first!</div></div>';return;}
    let prevDate='', html='';
    snap.docs.forEach(d=>{
      const m=d.data(), out=m.fromUid===_user.uid;
      const ts=m.createdAt?.toDate?m.createdAt.toDate():new Date();
      const dateStr=ts.toDateString();
      if(dateStr!==prevDate){prevDate=dateStr;html+=`<div class="day-sep"><span>${fmtDate(ts)}</span></div>`;}
      html+=`<div class="bubble-wrap ${out?'out':'in'}"><div class="bubble ${out?'out':'in'}">${esc(m.text||'')}</div><div class="bubble-time">${fmtTime(ts)}</div></div>`;
    });
    wrap.innerHTML=html;
    wrap.scrollTop=wrap.scrollHeight;
  },(err)=>{ console.error('Messages error:',err); showError('Could not load messages. Firestore rules may need updating.'); });
}

window.sendMsg=async function(){
  const input=document.getElementById('composeInput');
  const text=input.value.trim();
  if(!text||!_user||!_activeConvoId||!_activeOther) return;
  if(window.containsProfanity&&window.containsProfanity(text)){showError('Message blocked — restricted language');return;}
  const btn=document.getElementById('sendBtn'); btn.disabled=true;
  input.value='';
  try {
    await addDoc(collection(db,'conversations',_activeConvoId,'messages'),{
      fromUid:_user.uid,
      fromUsername:_profile?.username||'Unknown',
      text:text.slice(0,400),
      createdAt:serverTimestamp(),
    });
    await updateDoc(doc(db,'conversations',_activeConvoId),{
      lastMessage:text.slice(0,100), lastAt:serverTimestamp(),
      [`unread.${_activeOther.uid}`]:increment(1),
    });
  } catch(e){
    showError('Send failed — '+e.message+'. Make sure Firestore rules allow conversations.');
    input.value=text; // restore
  } finally { btn.disabled=false; input.focus(); }
};

function fmtTime(d){ return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(d){
  const today=new Date(), yest=new Date(today); yest.setDate(yest.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Today';
  if(d.toDateString()===yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
<script type="module" src="auth.js"></script>
</body>
</html>

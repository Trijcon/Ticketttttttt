<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — Profile</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.profile-wrap { max-width:860px; margin:0 auto; }

/* HEADER */
.profile-header {
  background:var(--glass); border:1px solid var(--border);
  border-radius:var(--radius); padding:28px;
  display:flex; align-items:center; gap:22px; margin-bottom:14px;
}
.profile-photo {
  width:72px; height:72px; border-radius:50%;
  background:var(--bg4); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:700;
  flex-shrink:0; overflow:hidden; color:var(--muted);
}
.profile-photo img { width:100%; height:100%; object-fit:cover; }
.profile-name { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:24px; color:var(--white); margin-bottom:3px; letter-spacing:-0.3px; }
.profile-tier { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--blue); letter-spacing:0.5px; margin-bottom:12px; }
.profile-stats { display:flex; gap:24px; }
.pstat-v { font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:var(--white); }
.pstat-l { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--muted2); margin-top:1px; }
.profile-elo { font-family:'Space Grotesk',sans-serif; font-size:48px; font-weight:700; color:var(--blue); line-height:1; margin-left:auto; }
.profile-elo-label { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:1px; color:var(--muted2); text-align:right; margin-top:3px; }

/* LAYOUT */
.profile-layout { display:grid; grid-template-columns:1fr 1.3fr; gap:12px; align-items:start; }

/* CARDS */
.pcard { background:var(--glass); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:10px; }
.pcard-head { padding:12px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.pcard-title { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted2); text-transform:uppercase; }
.pcard-body { padding:18px; }

/* FIELDS */
.field-group { margin-bottom:16px; }
.field-label { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--muted2); margin-bottom:6px; display:block; text-transform:uppercase; }
.field-val {
  font-size:14px; color:var(--silver); padding:10px 14px;
  background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius);
  width:100%; font-family:'Inter',sans-serif;
}
.field-input {
  font-size:14px; color:var(--white); padding:10px 14px;
  background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius);
  width:100%; outline:none; transition:border-color 0.2s; font-family:'Inter',sans-serif;
}
.field-input:focus { border-color:rgba(74,158,255,0.3); }
.edit-link { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.5px; color:var(--muted2); background:none; border:none; cursor:pointer; transition:color 0.2s; }
.edit-link:hover { color:var(--blue); }

/* MATCH HISTORY */
.match-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
.match-row:last-child { border-bottom:none; }
.match-result { width:32px; height:32px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; flex-shrink:0; letter-spacing:0; }
.match-result.w { background:rgba(34,197,94,0.08); color:var(--green); border:1px solid rgba(34,197,94,0.15); }
.match-result.l { background:rgba(239,68,68,0.08); color:var(--red); border:1px solid rgba(239,68,68,0.15); }
.match-opp { font-size:13px; color:var(--silver); font-weight:500; flex:1; }
.match-score { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2); }
.match-elo { font-family:'JetBrains Mono',monospace; font-size:11px; }
.match-elo.up { color:var(--green); } .match-elo.dn { color:var(--red); }

/* ACTIONS */
.action-row { display:flex; flex-direction:column; gap:8px; }

/* CONFIRM MODAL */
.confirm-inner { text-align:center; }
.confirm-icon { font-size:36px; margin-bottom:12px; }
.confirm-text { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:20px; }
.confirm-btns { display:flex; gap:10px; }

@media(max-width:700px){.profile-layout{grid-template-columns:1fr;}.profile-header{flex-direction:column;text-align:center;}.profile-elo{margin-left:0;}.profile-stats{justify-content:center;}}
</style>
</head>
<body>
<div class="page-wrap">
<div class="profile-wrap">

  <!-- HEADER -->
  <div class="profile-header">
    <div class="profile-photo" id="pPhoto">?</div>
    <div>
      <div class="profile-name" id="pName">Loading...</div>
      <div class="profile-tier" id="pTier">—</div>
      <div class="profile-stats">
        <div><div class="pstat-v" id="pWins">0</div><div class="pstat-l">Wins</div></div>
        <div><div class="pstat-v" id="pLosses">0</div><div class="pstat-l">Losses</div></div>
        <div><div class="pstat-v" id="pWR">—</div><div class="pstat-l">Win Rate</div></div>
        <div><div class="pstat-v">S1</div><div class="pstat-l">Season</div></div>
      </div>
    </div>
    <div>
      <div class="profile-elo" id="pElo">400</div>
      <div class="profile-elo-label">ELO Rating</div>
    </div>
  </div>

  <div class="profile-layout">
    <!-- LEFT -->
    <div>
      <div class="pcard">
        <div class="pcard-head">
          <div class="pcard-title">Identity</div>
          <button class="edit-link" id="editBtn" onclick="toggleEdit()">Edit</button>
        </div>
        <div class="pcard-body">
          <div class="field-group">
            <label class="field-label">Display Name</label>
            <div id="nameDisplay" class="field-val"></div>
            <input id="nameInput" class="field-input" type="text" maxlength="24" style="display:none;">
            <div id="saveRow" style="display:none;margin-top:8px;display:none;">
              <button class="btn-primary" style="font-size:13px;padding:9px 20px;" onclick="saveName()">Save</button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Username</label>
            <div class="field-val" id="usernameDisplay" style="color:var(--muted);">—</div>
          </div>
          <div class="field-group">
            <label class="field-label">Email</label>
            <div class="field-val" id="emailDisplay" style="color:var(--muted);">—</div>
          </div>
          <div class="field-group">
            <label class="field-label">Member Since</label>
            <div class="field-val" id="joinDate" style="color:var(--muted);">—</div>
          </div>
        </div>
      </div>

      <div class="pcard">
        <div class="pcard-head"><div class="pcard-title">Account</div></div>
        <div class="pcard-body">
          <div class="action-row">
            <button class="btn-ghost" onclick="signOutUser()" style="width:100%;text-align:center;">Sign Out</button>
            <button class="btn-danger" onclick="openModal('confirmDelete')" style="width:100%;text-align:center;">Delete Account</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div>
      <div class="pcard">
        <div class="pcard-head"><div class="pcard-title">Match History</div></div>
        <div class="pcard-body" id="matchHistory">
          <div style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);padding:16px 0;">No matches yet — get in the arena</div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="confirmDelete" onclick="if(event.target===this)closeModal('confirmDelete')">
  <div class="modal-box" style="max-width:380px;">
    <div class="confirm-inner">
      <div class="confirm-icon">⚠️</div>
      <div class="modal-title" style="font-size:20px;">Delete Account?</div>
      <div class="confirm-text">This permanently deletes your profile, ELO and match history. This cannot be undone.</div>
      <div class="confirm-btns">
        <button class="btn-ghost" style="flex:1;" onclick="closeModal('confirmDelete')">Cancel</button>
        <button class="btn-danger" style="flex:1;" onclick="deleteAccount()">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, deleteUser, signOut }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyBpMuv59Rlhc2roSiTPBzjKKHjuwqe0TFs",
  authDomain:"mogmetv.firebaseapp.com", projectId:"mogmetv",
  storageBucket:"mogmetv.firebasestorage.app",
  messagingSenderId:"1067675943117",
  appId:"1:1067675943117:web:9545a8bbfa7f68d5db2984"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

let _user = null, _profile = null, _editMode = false;

injectSharedUI();
connectWS();

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href='index.html'; return; }
  _user = user;
  try {
    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists()) { window.location.href='setup.html'; return; }
    _profile = snap.data();
    renderProfile(user, _profile);
  } catch(e) { console.error('Profile load error:',e); }
});

function renderProfile(user, p) {
  const elo    = p.elo || 400;
  const wins   = p.wins || 0;
  const losses = p.losses || 0;
  const wr     = (wins+losses) ? Math.round(wins/(wins+losses)*100)+'%' : '—';

  // Photo
  const photoEl = document.getElementById('pPhoto');
  const photoSrc = p.photoURL || user.photoURL;
  if (photoSrc) {
    photoEl.innerHTML = `<img src="${photoSrc}" onerror="this.parentElement.textContent='${(p.username||'?')[0].toUpperCase()}'">`;
  } else {
    photoEl.textContent = (p.username||'?')[0].toUpperCase();
  }

  document.getElementById('pName').textContent    = p.displayName || p.username || 'Unknown';
  document.getElementById('pTier').textContent    = getTierEmoji(elo)+' '+getTierName(elo)+' · '+elo+' ELO';
  document.getElementById('pElo').textContent     = elo;
  document.getElementById('pWins').textContent    = wins;
  document.getElementById('pLosses').textContent  = losses;
  document.getElementById('pWR').textContent      = wr;
  document.getElementById('nameDisplay').textContent  = p.displayName || p.username || '—';
  document.getElementById('nameInput').value          = p.displayName || p.username || '';
  document.getElementById('usernameDisplay').textContent = p.username || '—';
  document.getElementById('emailDisplay').textContent    = user.email || '—';

  if (p.createdAt?.toDate) {
    document.getElementById('joinDate').textContent = p.createdAt.toDate().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  }

  const hist = p.matchHistory || [];
  const histEl = document.getElementById('matchHistory');
  if (!hist.length) {
    histEl.innerHTML = '<div style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--muted2);padding:16px 0;">No matches yet — get in the arena</div>';
  } else {
    histEl.innerHTML = hist.slice(-10).reverse().map(m => `
      <div class="match-row">
        <div class="match-result ${m.won?'w':'l'}">${m.won?'W':'L'}</div>
        <div style="flex:1;">
          <div class="match-opp">${m.opponentName||'Unknown'}</div>
          <div class="match-score">${(m.myScore||0).toFixed(1)} vs ${(m.oppScore||0).toFixed(1)}</div>
        </div>
        <div class="match-elo ${m.eloChange>=0?'up':'dn'}">${m.eloChange>=0?'+':''}${m.eloChange}</div>
      </div>`).join('');
  }
}

window.toggleEdit = function() {
  _editMode = !_editMode;
  document.getElementById('nameDisplay').style.display = _editMode ? 'none' : 'block';
  document.getElementById('nameInput').style.display   = _editMode ? 'block' : 'none';
  document.getElementById('saveRow').style.display     = _editMode ? 'block' : 'none';
  document.getElementById('editBtn').textContent       = _editMode ? 'Cancel' : 'Edit';
};

window.saveName = async function() {
  const newName = document.getElementById('nameInput').value.trim();
  if (!newName || !_user) return;
  if (newName.length < 2) { alert('Name too short'); return; }
  try {
    await updateDoc(doc(db,'users',_user.uid), { displayName:newName, lastSeen:serverTimestamp() });
    document.getElementById('nameDisplay').textContent = newName;
    document.getElementById('pName').textContent = newName;
    localStorage.setItem('mgm_name', newName);
    window.toggleEdit();
  } catch(e) { alert('Save failed: '+e.message); }
};

window.signOutUser = async function() {
  await signOut(auth);
  ['mgm_uid','mgm_username','mgm_name','mgm_elo','mgm_wins','mgm_losses','mgm_photo']
    .forEach(k=>localStorage.removeItem(k));
  window.location.href = 'index.html';
};

window.deleteAccount = async function() {
  if (!_user) return;
  try {
    await deleteDoc(doc(db,'users',_user.uid));
    const unameLower = _profile?.usernameLower;
    if (unameLower) await deleteDoc(doc(db,'usernames',unameLower));
    await deleteUser(_user);
    ['mgm_uid','mgm_username','mgm_name','mgm_elo','mgm_wins','mgm_losses','mgm_photo']
      .forEach(k=>localStorage.removeItem(k));
    window.location.href = 'index.html';
  } catch(e) { alert('Delete failed. Please sign out and sign back in, then try again.'); }
};
</script>
<script type="module" src="auth.js"></script>
</body>
</html>

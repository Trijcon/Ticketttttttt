<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MogMe.TV — User Profile</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.user-shell { max-width:760px; margin:0 auto; }

/* ── HEADER CARD ── */
.uh-card {
  background:linear-gradient(180deg, rgba(26,16,48,0.6) 0%, rgba(15,15,28,0.6) 100%);
  border:1px solid rgba(123,97,255,0.18);
  border-radius:16px;
  padding:26px;
  position:relative;
  overflow:hidden;
  margin-bottom:14px;
}
.uh-card::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 0%, rgba(245,166,35,0.06) 0%, transparent 70%);
  pointer-events:none;
}
.uh-top { display:flex; align-items:flex-start; gap:18px; position:relative; z-index:1; }
.uh-photo {
  width:88px; height:88px; border-radius:50%;
  background:var(--bg4); border:2px solid rgba(245,166,35,0.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Grotesk',sans-serif; font-size:36px; font-weight:700;
  flex-shrink:0; overflow:hidden; color:var(--silver);
  box-shadow:0 0 22px rgba(245,166,35,0.18);
}
.uh-photo img { width:100%; height:100%; object-fit:cover; }
.uh-id { flex:1; min-width:0; }
.uh-name {
  font-family:'JetBrains Mono', monospace; font-weight:700;
  font-size:24px; color:var(--white); letter-spacing:-0.3px; margin-bottom:8px;
}
.uh-badges-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.uh-pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:999px;
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px;
  border:1px solid var(--border2);
  color:var(--silver);
}
.uh-pill.gold     { color:#f5a623; border-color:rgba(245,166,35,0.4); background:rgba(245,166,35,0.08); }
.uh-pill.violet   { color:#7b61ff; border-color:rgba(123,97,255,0.4); background:rgba(123,97,255,0.08); }
.uh-pill.tier     { color:#0df2c8; border-color:rgba(13,242,200,0.35); background:rgba(13,242,200,0.07); }
.uh-pill.crimson  { color:#ff3d6b; border-color:rgba(255,61,107,0.35); background:rgba(255,61,107,0.07); }

.uh-rank-row { display:flex; align-items:center; gap:8px; }
.uh-rank-num {
  font-family:'JetBrains Mono',monospace; font-weight:700;
  background:rgba(245,166,35,0.12); border:1px solid rgba(245,166,35,0.4);
  color:#f5a623; padding:3px 9px; border-radius:6px; font-size:12px;
}
.uh-rank-meta { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:0.5px; }
.uh-rank-meta b { color:var(--silver); font-weight:600; }

/* Stat row */
.uh-stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  margin-top:18px; position:relative; z-index:1;
}
.uh-stat {
  background:rgba(0,0,0,0.35); border:1px solid var(--border2);
  border-radius:10px; padding:12px; text-align:center;
}
.uh-stat-lbl { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted2); margin-bottom:5px; text-transform:uppercase; }
.uh-stat-val { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:#0df2c8; }
.uh-stat:nth-child(2) .uh-stat-val { color:#f5a623; }
.uh-stat:nth-child(3) .uh-stat-val { color:#7b61ff; }

/* Public appeal pill */
.uh-appeal {
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 14px; border-radius:999px; margin-top:14px;
  background:rgba(245,166,35,0.08); border:1px solid rgba(245,166,35,0.3);
  font-family:'JetBrains Mono',monospace; font-size:11px; color:#f5a623; letter-spacing:1px;
  position:relative; z-index:1;
}
.uh-appeal-star { color:#ffd76a; }
.uh-appeal-count { color:var(--muted2); }

/* Trophies */
.uh-trophies { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; position:relative; z-index:1; }
.uh-trophy {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:8px;
  background:rgba(0,0,0,0.45); border:1px solid var(--border2);
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.8px;
  color:var(--silver);
}

/* Action row */
.uh-actions { display:flex; gap:8px; margin-top:14px; position:relative; z-index:1; }
.btn-follow {
  padding:10px 22px; border-radius:8px;
  background:var(--blue); border:none; color:#000;
  font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  transition:opacity 0.2s;
}
.btn-follow:hover { opacity:0.85; }
.btn-follow.following {
  background:transparent; border:1px solid var(--border2); color:var(--silver);
}
.btn-msg {
  padding:10px 22px; border-radius:8px;
  background:transparent; border:1px solid var(--border2); color:var(--silver);
  font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:500; cursor:pointer;
  transition:all 0.2s;
}
.btn-msg:hover { color:var(--white); border-color:var(--border3); }

/* ── COMMENTS (Reddit-style) ── */
.comments-card {
  background:rgba(15,15,28,0.5);
  border:1px solid var(--border);
  border-radius:14px;
  padding:0;
  overflow:hidden;
}
.comments-list {
  max-height:500px; overflow-y:auto;
  padding:6px 0;
}
.comments-list::-webkit-scrollbar { width:5px; }
.comments-list::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:999px; }

.cm-row {
  display:flex; gap:10px; padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.cm-row:last-child { border-bottom:none; }
.cm-vote {
  display:flex; flex-direction:column; align-items:center; flex-shrink:0;
  font-family:'JetBrains Mono',monospace; font-size:11px;
  width:28px;
}
.cm-vote-btn {
  background:none; border:none; color:var(--muted2); cursor:pointer;
  font-size:14px; line-height:1; padding:2px 0; transition:color 0.15s;
}
.cm-vote-btn:hover { color:var(--silver); }
.cm-vote-btn.up.active { color:#f5a623; }
.cm-vote-btn.down.active { color:#7b61ff; }
.cm-vote-num { color:var(--silver); font-weight:700; padding:2px 0; }

.cm-body { flex:1; min-width:0; }
.cm-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.cm-author {
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--silver); font-weight:700;
  text-decoration:none;
}
.cm-author:hover { color:var(--blue); }
.cm-date { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2); }
.cm-flag {
  margin-left:auto; background:none; border:none; color:var(--muted2);
  cursor:pointer; font-size:11px; opacity:0.6; transition:opacity 0.15s;
}
.cm-flag:hover { opacity:1; color:#ff3d6b; }

.cm-text { font-size:13px; color:var(--silver); line-height:1.55; word-break:break-word; margin-bottom:6px; }
.cm-counts {
  display:flex; gap:10px;
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2);
}
.cm-counts .up { color:#f5a623; }
.cm-counts .down { color:#7b61ff; }

.cm-empty {
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted2);
  letter-spacing:0.5px; text-align:center; padding:30px 16px;
}

/* Comment input — bottom of card */
.cm-input-wrap {
  position:relative;
  border-top:1px solid var(--border);
  padding:12px 16px;
  background:rgba(0,0,0,0.3);
}
.cm-input {
  width:100%;
  background:rgba(0,0,0,0.4); border:1px solid var(--border2);
  border-radius:8px; padding:10px 90px 10px 14px;
  font-family:'Inter',sans-serif; font-size:13px;
  color:var(--white); outline:none; resize:none;
  transition:border-color 0.2s;
  box-sizing:border-box;
}
.cm-input:focus { border-color:rgba(74,158,255,0.35); }
.cm-input-counter {
  position:absolute; left:24px; bottom:24px;
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2);
}
.cm-submit {
  position:absolute; right:24px; bottom:20px;
  padding:6px 14px; border-radius:6px;
  background:rgba(245,166,35,0.12); border:1px solid rgba(245,166,35,0.3);
  color:#f5a623; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px;
  font-weight:700; cursor:pointer;
  display:inline-flex; align-items:center; gap:5px;
}
.cm-submit:hover { background:rgba(245,166,35,0.2); }
.cm-submit:disabled { opacity:0.4; cursor:not-allowed; }

/* Match history (collapsible block above comments) */
.matches-card {
  background:var(--glass); border:1px solid var(--border);
  border-radius:12px; padding:14px 16px; margin-bottom:14px;
}
.match-head {
  font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px;
  color:var(--muted); text-transform:uppercase; margin-bottom:10px;
}
.match-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.match-row:last-child { border-bottom:none; }
.match-result { width:28px; height:28px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; flex-shrink:0; }
.match-result.w { background:rgba(34,197,94,0.08); color:var(--green); border:1px solid rgba(34,197,94,0.18); }
.match-result.l { background:rgba(239,68,68,0.08); color:var(--red); border:1px solid rgba(239,68,68,0.18); }
.match-opp { font-size:12px; color:var(--silver); font-weight:500; flex:1; }
.match-score { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted2); margin-top:1px; }
.match-elo { font-family:'JetBrains Mono',monospace; font-size:11px; }
.match-elo.up { color:var(--green); } .match-elo.dn { color:var(--red); }

@media(max-width:600px){
  .uh-stats { grid-template-columns:1fr 1fr; }
  .uh-stat:nth-child(3) { grid-column:1/-1; }
}
</style>
</head>
<body>
<div class="page-wrap">
<div class="user-shell">

  <!-- ── HEADER CARD ── -->
  <div class="uh-card">
    <div class="uh-top">
      <div class="uh-photo" id="uPhoto">?</div>
      <div class="uh-id">
        <div class="uh-name" id="uName">Loading...</div>
        <div class="uh-badges-row" id="uBadges"></div>
        <div class="uh-rank-row" id="uRankRow" style="display:none;">
          <span class="uh-rank-num" id="uRankNum">#—</span>
          <span class="uh-rank-meta"><b id="uRankRole">ARENA RANK</b><br>
            <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:1px;" id="uRankSub">SEASON 1 STANDING</span>
          </span>
        </div>
      </div>
    </div>

    <div class="uh-stats">
      <div class="uh-stat"><div class="uh-stat-lbl">ELO</div><div class="uh-stat-val" id="sElo">—</div></div>
      <div class="uh-stat"><div class="uh-stat-lbl">Wins</div><div class="uh-stat-val" id="sWins">—</div></div>
      <div class="uh-stat"><div class="uh-stat-lbl">Comments</div><div class="uh-stat-val" id="sComments">—</div></div>
    </div>

    <div class="uh-appeal" id="uAppeal" style="display:none;">
      <span>👁 PUBLIC APPEAL:</span>
      <b id="uAppealVal">—</b>
      <span class="uh-appeal-star">⭐</span>
      <span class="uh-appeal-count" id="uAppealCount">(0)</span>
    </div>

    <div class="uh-trophies" id="uTrophies"></div>

    <div class="uh-actions">
      <button class="btn-follow" id="followBtn" onclick="toggleFollow()" style="display:none;">+ Follow</button>
      <button class="btn-msg" id="msgBtn" onclick="alert('Direct messages are coming soon.')" style="display:none;">Message</button>
    </div>
  </div>

  <!-- MATCH HISTORY -->
  <div class="matches-card">
    <div class="match-head">Recent Matches</div>
    <div id="matchList">
      <div class="cm-empty" style="padding:14px 0;">No matches yet</div>
    </div>
  </div>

  <!-- ── COMMENTS ── -->
  <div class="comments-card">
    <div class="comments-list" id="commentList">
      <div class="cm-empty">Loading comments...</div>
    </div>
    <div class="cm-input-wrap">
      <textarea class="cm-input" id="commentInput" placeholder="Leave a comment..." maxlength="280" rows="2"></textarea>
      <div class="cm-input-counter" id="cmCounter">280</div>
      <button class="cm-submit" onclick="postComment()">📝 POST</button>
    </div>
  </div>

</div>
</div>

<script src="shared.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, limit,
         getDocs, addDoc, serverTimestamp, arrayUnion, arrayRemove, increment }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyBpMuv59Rlhc2roSiTPBzjKKHjuwqe0TFs",
  authDomain:"mogmetv.firebaseapp.com", projectId:"mogmetv",
  storageBucket:"mogmetv.firebasestorage.app",
  messagingSenderId:"1067675943117",
  appId:"1:1067675943117:web:9545a8bbfa7f68d5db2984"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

injectSharedUI();
connectWS();

let _viewer = null;
let _viewerProfile = null;
let _profileUid = null;
let _profileData = null;

const params = new URLSearchParams(location.search);
const targetUsername = params.get('u') || '';
if (!targetUsername) {
  document.getElementById('uName').textContent = 'No user specified';
} else {
  loadProfile(targetUsername.toLowerCase());
}

// Comment input character counter
const cmInput = document.getElementById('commentInput');
cmInput.addEventListener('input', () => {
  document.getElementById('cmCounter').textContent = (280 - cmInput.value.length);
});

async function loadProfile(unameLower) {
  try {
    const usnap = await getDoc(doc(db,'usernames',unameLower));
    if (!usnap.exists()) { document.getElementById('uName').textContent = 'User not found'; return; }
    _profileUid = usnap.data().uid;
    const psnap = await getDoc(doc(db,'users',_profileUid));
    if (!psnap.exists()) { document.getElementById('uName').textContent = 'User not found'; return; }
    _profileData = psnap.data();
    renderProfile(_profileData);
    loadComments();
    computeArenaRank();
  } catch(e) {
    console.error('Load profile error:', e);
    document.getElementById('uName').textContent = 'Error loading profile';
  }
}

function renderProfile(p) {
  const elo = p.elo || 400;
  const tierName  = (typeof getTierName==='function') ? getTierName(elo) : 'Sub3';
  const tierEmoji = (typeof getTierEmoji==='function') ? getTierEmoji(elo) : '🔴';

  // Photo
  const initial = (p.username||'?')[0].toUpperCase();
  const photoEl = document.getElementById('uPhoto');
  if (p.photoURL) photoEl.innerHTML = `<img src="${p.photoURL}" onerror="this.parentElement.textContent='${initial}'">`;
  else photoEl.textContent = initial;

  // Name with country flag if known
  const flagPrefix = p.countryFlag ? `${p.countryFlag} ` : '';
  document.getElementById('uName').textContent = (flagPrefix + (p.username||'Unknown')).trim();

  // Badges row — top-line pills (rank, tier, season)
  const badgesEl = document.getElementById('uBadges');
  const tierPillClass = elo >= 5001 ? 'crimson' : elo >= 3501 ? 'gold' : elo >= 2001 ? 'violet' : elo >= 1501 ? 'tier' : '';
  badgesEl.innerHTML = `
    <span class="uh-pill ${tierPillClass}">${tierEmoji} ${tierName.toUpperCase()}</span>
    <span class="uh-pill violet">S1 RANK</span>
    ${p.role && p.role !== 'user' ? `<span class="uh-pill crimson">${p.role.toUpperCase()}</span>` : ''}
    ${p.proActive ? `<span class="uh-pill gold">💎 PRO</span>` : ''}
  `;

  // Stats
  document.getElementById('sElo').textContent  = elo;
  document.getElementById('sWins').textContent = p.wins || 0;

  // Public Appeal — average of post-match opponent ratings (1-10)
  if (p.appealSum && p.appealCount) {
    const avg = (p.appealSum / p.appealCount);
    document.getElementById('uAppealVal').textContent = avg.toFixed(1);
    document.getElementById('uAppealCount').textContent = `(${p.appealCount})`;
    document.getElementById('uAppeal').style.display = '';
  }

  // Trophies — auto + admin badges
  const auto = [
    { label: 'S1 Player', icon: '◇' },
    { label: 'S1 ' + tierName.toUpperCase(), icon: tierEmoji },
  ];
  if ((p.wins||0) >= 100)  auto.push({ label: '100 WINS',  icon: '🏆' });
  if ((p.wins||0) >= 500)  auto.push({ label: '500 WINS',  icon: '🏆' });
  if ((p.wins||0) >= 1000) auto.push({ label: '1000 WINS', icon: '🏆' });
  const admin = Array.isArray(p.badges) ? p.badges : [];
  const all = auto.concat(admin);
  document.getElementById('uTrophies').innerHTML = all.map(b =>
    `<div class="uh-trophy">${b.icon||'🏅'} ${escapeHtml(b.label||'')}</div>`
  ).join('');

  // Match history
  const hist = Array.isArray(p.matchHistory) ? p.matchHistory : [];
  const ml = document.getElementById('matchList');
  if (!hist.length) {
    ml.innerHTML = '<div class="cm-empty" style="padding:14px 0;">No matches yet</div>';
  } else {
    ml.innerHTML = hist.slice(-15).reverse().map(m => `
      <div class="match-row">
        <div class="match-result ${m.won?'w':'l'}">${m.won?'W':'L'}</div>
        <div style="flex:1;">
          <div class="match-opp">${escapeHtml(m.opponentName||'Unknown')}${m.bot?' 🤖':''}</div>
          <div class="match-score">${(m.myScore||0).toFixed(1)} vs ${(m.oppScore||0).toFixed(1)}</div>
        </div>
        <div class="match-elo ${m.eloChange>=0?'up':'dn'}">${m.eloChange>=0?'+':''}${m.eloChange||0}</div>
      </div>`).join('');
  }
}

// Compute arena rank by counting users with higher ELO (cap at 1000 for query budget)
async function computeArenaRank(){
  if (!_profileData) return;
  try {
    const q = query(collection(db,'users'), orderBy('elo','desc'), limit(1000));
    const snap = await getDocs(q);
    let rank = 0;
    snap.docs.forEach((d, i) => { if (d.id === _profileUid) rank = i+1; });
    if (rank > 0) {
      document.getElementById('uRankNum').textContent  = '#' + rank;
      document.getElementById('uRankRole').textContent = rank === 1 ? 'ARENA CHAMPION' : 'ARENA RANK';
      document.getElementById('uRankSub').textContent  = rank === 1 ? 'UNDISPUTED LEADER' : 'SEASON 1 STANDING';
      document.getElementById('uRankRow').style.display = '';
    }
  } catch(e) {/*ignore*/}
}

onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  _viewer = user;
  try {
    const snap = await getDoc(doc(db,'users',user.uid));
    if (snap.exists()) _viewerProfile = snap.data();
  } catch(e){}
  if (_profileUid && _profileUid !== user.uid) {
    document.getElementById('followBtn').style.display = '';
    document.getElementById('msgBtn').style.display = '';
    updateFollowButton();
  }
});

function updateFollowButton(){
  const btn = document.getElementById('followBtn');
  if (!_viewerProfile || !_profileUid) return;
  const followingArr = _viewerProfile.following || [];
  const isFollowing = followingArr.indexOf(_profileUid) >= 0;
  btn.textContent = isFollowing ? '✓ Following' : '+ Follow';
  btn.classList.toggle('following', isFollowing);
}

window.toggleFollow = async function(){
  if (!_viewer || !_profileUid) { alert('Sign in to follow'); return; }
  if (_profileUid === _viewer.uid) return;
  const followingArr = (_viewerProfile && _viewerProfile.following) || [];
  const isFollowing = followingArr.indexOf(_profileUid) >= 0;
  try {
    if (isFollowing) {
      await updateDoc(doc(db,'users',_viewer.uid), {
        following: arrayRemove(_profileUid), followingCount: increment(-1),
      });
      await updateDoc(doc(db,'users',_profileUid), {
        followers: arrayRemove(_viewer.uid), followerCount: increment(-1),
      });
      _viewerProfile.following = followingArr.filter(x=>x!==_profileUid);
    } else {
      await updateDoc(doc(db,'users',_viewer.uid), {
        following: arrayUnion(_profileUid), followingCount: increment(1),
      });
      await updateDoc(doc(db,'users',_profileUid), {
        followers: arrayUnion(_viewer.uid), followerCount: increment(1),
      });
      _viewerProfile.following = followingArr.concat([_profileUid]);
    }
    updateFollowButton();
  } catch(e) { alert('Action failed: '+e.message); }
};

window.postComment = async function(){
  const input = document.getElementById('commentInput');
  const text  = input.value.trim();
  if (!text) return;
  if (!_viewer || !_viewerProfile) { alert('Sign in to comment'); return; }
  if (window.containsProfanity && window.containsProfanity(text)) {
    alert('Comment blocked — restricted language');
    return;
  }
  try {
    await addDoc(collection(db,'users',_profileUid,'comments'), {
      authorUid: _viewer.uid,
      authorUsername: _viewerProfile.username || 'Unknown',
      authorPhoto: _viewerProfile.photoURL || '',
      text: text.slice(0,280),
      createdAt: serverTimestamp(),
      upvotes: 0,
      downvotes: 0,
    });
    input.value = '';
    document.getElementById('cmCounter').textContent = '280';
    loadComments();
  } catch(e) {
    alert('Post failed — make sure your Firestore rules allow comments. '+ e.message);
  }
};

window.voteComment = async function(commentId, dir){
  if (!_viewer) { alert('Sign in to vote'); return; }
  const key = `mgm_vote_${commentId}`;
  const prev = localStorage.getItem(key);
  if (prev === dir) return;  // already voted this way
  try {
    const ref = doc(db,'users',_profileUid,'comments',commentId);
    const upDelta   = (dir==='up' ? 1 : 0) + (prev==='up' ? -1 : 0);
    const downDelta = (dir==='down' ? 1 : 0) + (prev==='down' ? -1 : 0);
    await updateDoc(ref, {
      upvotes: increment(upDelta),
      downvotes: increment(downDelta),
    });
    localStorage.setItem(key, dir);
    loadComments();
  } catch(e) { console.warn('Vote failed:', e); }
};

async function loadComments(){
  if (!_profileUid) return;
  try {
    const q = query(collection(db,'users',_profileUid,'comments'), orderBy('createdAt','desc'), limit(50));
    const snap = await getDocs(q);
    const list = document.getElementById('commentList');
    document.getElementById('sComments').textContent = snap.size;
    if (snap.empty) {
      list.innerHTML = '<div class="cm-empty">No comments yet — be the first</div>';
      return;
    }
    list.innerHTML = snap.docs.map(d => {
      const c = d.data();
      const id = d.id;
      const up = c.upvotes || 0;
      const down = c.downvotes || 0;
      const score = up - down;
      const myVote = localStorage.getItem(`mgm_vote_${id}`) || '';
      const when = c.createdAt?.toDate ? formatDate(c.createdAt.toDate()) : '';
      return `<div class="cm-row">
        <div class="cm-vote">
          <button class="cm-vote-btn up ${myVote==='up'?'active':''}" onclick="voteComment('${id}','up')">▲</button>
          <span class="cm-vote-num">${score}</span>
          <button class="cm-vote-btn down ${myVote==='down'?'active':''}" onclick="voteComment('${id}','down')">▼</button>
        </div>
        <div class="cm-body">
          <div class="cm-meta">
            <a class="cm-author" href="user.html?u=${encodeURIComponent(c.authorUsername||'')}">${escapeHtml(c.authorUsername||'Unknown')}</a>
            <span class="cm-date">${when}</span>
            <button class="cm-flag" title="Report">⚑</button>
          </div>
          <div class="cm-text">${escapeHtml(c.text||'')}</div>
          <div class="cm-counts"><span class="up">${up} up</span> / <span class="down">${down} down</span></div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('commentList').innerHTML = '<div class="cm-empty">Could not load comments</div>';
    console.error('Load comments error:', e);
  }
}

function formatDate(d){
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
</script>
